<link rel="stylesheet" href="/theme.css">
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --card: var(--surface);
    --card2: var(--surface-2);
    --muted: var(--text-dim);
    --yellow: var(--gold);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior-y: contain;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 12px 16px;
    position: relative;
  }

  /* ---------- persistent nav ---------- */
  .site-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 2px 10px;
    max-width: 480px;
    margin: 0 auto;
  }
  .site-nav .nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .site-nav a.nav-wordmark {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .exit-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 8px 10px;
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), color 0.15s ease;
  }
  .exit-btn:hover { color: var(--text); }
  .exit-btn:active { transform: scale(0.94); }
  .exit-btn.hidden { display: none; }
  .site-nav .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @media (min-width: 860px) {
    #app, .site-nav { max-width: 860px; }
  }
  .nav-streak {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--gold);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 10px;
  }
  .nav-streak.hidden { display: none; }
  a.nav-streak.nav-ticks { text-decoration: none; cursor: pointer; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1); }
  a.nav-streak.nav-ticks:active { transform: scale(0.93); }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 2px 0 6px;
  }
  .bankroll { text-align: center; }
  .bankroll-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    font-family: var(--font-body);
  }
  .bankroll-value {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    transition: color 0.2s;
  }
  .bankroll-value.flash-green { color: var(--green); }
  .bankroll-value.flash-red { color: var(--red); }
  .icon-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 38px; height: 38px;
    font-size: 1.1rem;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .icon-btn:active { transform: scale(0.92); }

  /* ---------- stats bar: one cohesive terminal readout ---------- */
  .statsbar {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 2px;
    margin-bottom: 6px;
  }
  .stat-chip {
    flex: 1;
    position: relative;
    padding: 2px 4px;
    text-align: center;
  }
  .stat-chip:not(:last-child)::after {
    content: "";
    position: absolute;
    right: 0; top: 12%; bottom: 12%;
    width: 1px;
    background: var(--border);
  }
  .stat-chip .stat-value {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 1.05rem;
    font-weight: 700;
    display: inline-block;
    transition: transform 0.15s;
  }
  .stat-chip .stat-value.pnl-up { color: var(--green); }
  .stat-chip .stat-value.pnl-down { color: var(--red); }
  .stat-chip .stat-label {
    display: block;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }
  .stat-value.shatter { animation: shatter 0.5s ease; }
  @keyframes shatter {
    0% { transform: scale(1) rotate(0); opacity: 1; }
    20% { transform: scale(1.15) rotate(-4deg); opacity: 1; }
    40% { transform: scale(0.9) rotate(4deg); opacity: 0.6; filter: blur(0.5px); }
    60% { transform: scale(1.05) rotate(-2deg); opacity: 0.4; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* ---------- multiplier badge ---------- */
  .multiplier-badge {
    position: absolute;
    top: 82px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: linear-gradient(135deg, #ffb020, #ff5e3a);
    color: #1a0a00;
    font-weight: 900;
    font-size: 1.3rem;
    padding: 10px 22px;
    border-radius: 999px;
    box-shadow: 0 6px 24px rgba(255, 130, 0, 0.5);
    z-index: 50;
    pointer-events: none;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .multiplier-badge.show { animation: badgeSlam 1.4s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes badgeSlam {
    0% { transform: translateX(-50%) scale(0) rotate(-8deg); opacity: 0; }
    15% { transform: translateX(-50%) scale(1.25) rotate(4deg); opacity: 1; }
    30% { transform: translateX(-50%) scale(0.95) rotate(-2deg); opacity: 1; }
    45% { transform: translateX(-50%) scale(1.05) rotate(0); opacity: 1; }
    75% { transform: translateX(-50%) scale(1) rotate(0); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) rotate(0); opacity: 0; }
  }

  /* ---------- chart ---------- */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 2px;
    position: relative;
    height: 50vh;
    min-height: 300px;
    max-height: 460px;
    overflow: hidden;
  }
  .chart-card.slide-in { animation: slideIn 0.3s ease-out; }
  @keyframes slideIn {
    from { transform: translateX(24px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .chart-card.zoom-pulse { animation: zoomPulse 0.25s ease; }
  @keyframes zoomPulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
  .chart-card.shake { animation: shakeAnim 0.2s ease; }
  @keyframes shakeAnim {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); } 40% { transform: translateX(7px); }
    60% { transform: translateX(-5px); } 80% { transform: translateX(3px); }
  }
  #chartContainer { width: 100%; height: 100%; transition: filter 0.4s ease; }
  #chartContainer.desaturate { filter: grayscale(0.7) brightness(0.85); }
  #chartContainer.fizzle-fade { filter: grayscale(1) brightness(0.7); }

  .range-zone {
    position: absolute;
    left: 6px; right: 6px;
    background: rgba(245, 180, 0, 0.08);
    border-top: 1px dashed rgba(245, 180, 0, 0.5);
    border-bottom: 1px dashed rgba(245, 180, 0, 0.5);
    pointer-events: none;
    transition: background 0.15s ease;
    z-index: 15;
  }
  .range-zone.pulse { background: rgba(245, 180, 0, 0.28); }

  .forming-marker {
    position: absolute;
    top: 8px; right: 10px;
    z-index: 20;
    background: rgba(245, 180, 0, 0.18);
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 5px;
    pointer-events: none;
    white-space: nowrap;
    transition: top 0.1s linear, left 0.1s linear;
  }
  .forming-marker .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--yellow);
    animation: formingPulse 1s ease-in-out infinite;
  }
  @keyframes formingPulse {
    0%, 100% { transform: scale(0.85); opacity: 0.7; box-shadow: 0 0 0 0 rgba(245,180,0,0.5); }
    50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 6px rgba(245,180,0,0); }
  }

  .range-label {
    position: absolute;
    right: 4px;
    z-index: 16;
    background: var(--yellow);
    color: #1a1200;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    font-weight: 800;
    padding: 3px 7px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    transition: top 0.1s linear;
  }
  .range-label.hidden { display: none; }

  .legend-row {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    font-size: 0.68rem; color: var(--muted); margin: 3px 0 2px;
  }
  .legend-row span { display: inline-flex; align-items: center; gap: 4px; }
  .legend-row .swatch { display: inline-block; width: 10px; height: 2px; }

  .powerup-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 8px 0 2px; }
  .powerup-bar.hidden { display: none; }
  .powerup-chip {
    background: var(--card2); border: 1px solid var(--border-strong); color: var(--text);
    font-family: var(--font-body); font-size: 0.78rem; font-weight: 600;
    padding: 7px 12px; border-radius: 999px; cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), border-color 0.15s ease;
  }
  .powerup-chip:active { transform: scale(0.94); }
  .powerup-chip:hover { border-color: var(--gold); }
  .powerup-chip.active { background: rgba(245,180,0,0.12); border-color: var(--yellow); color: var(--yellow); cursor: default; }
  .powerup-chip .chip-count { color: var(--text-dim); font-family: var(--font-mono); }
  .second-chance-btn {
    width: 100%; padding: 13px; font-size: 0.92rem; font-weight: 700; font-family: var(--font-display);
    border-radius: 12px; border: 1px solid rgba(199, 146, 234, 0.4); background: rgba(199, 146, 234, 0.1);
    color: var(--purple); cursor: pointer; margin-top: 8px;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .second-chance-btn:active { transform: scale(0.97); }

  /* ---------- timer ---------- */
  .timer-bar-wrap {
    height: 8px; background: var(--card2); border-radius: 5px;
    margin: 7px 0 6px; overflow: hidden; border: 1px solid var(--border);
  }
  .timer-fill { height: 100%; width: 100%; background: var(--green); border-radius: 5px; }
  .timer-fill.warn { background: var(--yellow); }
  .timer-fill.danger { background: var(--red); animation: timerPulse 0.5s ease-in-out infinite; }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* ---------- buttons ---------- */
  .buttons-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 18px 8px; font-size: 1.05rem; font-weight: 700;
    font-family: var(--font-display);
    border-radius: 16px; border: none; cursor: pointer; color: #fff;
    letter-spacing: 0.3px; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1); min-height: 60px;
  }
  .btn:active { transform: scale(0.94); }
  .btn.real { background: linear-gradient(180deg, #2fbf9f, var(--green-dark)); box-shadow: 0 6px 20px rgba(34,197,94,0.2); }
  .btn.fake { background: linear-gradient(180deg, #f0563f, var(--red-dark)); box-shadow: 0 6px 20px rgba(239,68,68,0.2); }
  .btn:disabled { opacity: 0.45; cursor: default; }

  .skip-message {
    text-align: center; padding: 14px 10px; border-radius: 14px;
    background: rgba(139, 149, 167, 0.12); border: 1px solid var(--border);
    color: var(--muted); font-weight: 600; font-size: 0.95rem;
  }

  /* ---------- coach card ---------- */
  .coach-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 14px; text-align: center; animation: coachIn 0.25s ease;
  }
  @keyframes coachIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .coach-outcome { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
  .coach-outcome.correct { color: var(--green); }
  .coach-outcome.wrong { color: var(--red); }
  .coach-outcome.neutral { color: var(--muted); }
  .coach-why { font-size: 0.88rem; color: var(--text); opacity: 0.9; margin-bottom: 4px; }
  .coach-pnl { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }
  .coach-pnl.pos { color: var(--green); }
  .coach-pnl.neg { color: var(--red); }
  .next-btn {
    width: 100%; padding: 14px; font-size: 1rem; font-weight: 700; font-family: var(--font-display); border-radius: 14px;
    border: 1px solid var(--border); background: var(--card2); color: var(--text); cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .next-btn:active { transform: scale(0.97); }

  .hidden { display: none !important; }

  /* ---------- end of day ---------- */
  .end-of-day { text-align: center; padding: 16px 10px; }
  .end-of-day h2 { font-family: var(--font-display); font-size: 1.5rem; margin: 4px 0 16px; }
  .eod-pnl { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 3rem; font-weight: 700; margin-bottom: 4px; }
  .eod-pnl.pos { color: var(--green); }
  .eod-pnl.neg { color: var(--red); }
  .eod-grid { display: flex; gap: 8px; margin: 16px 0; }
  .eod-grid .cell { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 6px; }
  .eod-grid .cell .v { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 1.3rem; font-weight: 700; }
  .eod-grid .cell .l { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .eod-verdict {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; font-size: 0.95rem; margin-bottom: 16px; line-height: 1.4;
  }
  .trade-again-btn {
    width: 100%; padding: 17px; font-size: 1.05rem; font-weight: 700; font-family: var(--font-display); border-radius: 16px;
    border: none; background: linear-gradient(180deg, #2fbf9f, var(--green-dark)); color: #fff; cursor: pointer;
    margin-bottom: 10px; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 6px 20px rgba(34,197,94,0.2);
  }
  .trade-again-btn:active { transform: scale(0.96); }
  .share-btn {
    width: 100%; padding: 15px; font-size: 0.95rem; font-weight: 700; font-family: var(--font-display); border-radius: 14px;
    border: 1px solid var(--border); background: var(--card2); color: var(--text); cursor: pointer;
    margin-bottom: 10px; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .share-btn:active { transform: scale(0.97); }
  .text-link-btn {
    background: none; border: none; color: var(--muted); font-size: 0.85rem;
    text-decoration: underline; cursor: pointer; padding: 8px;
  }

  /* ---------- exit confirm modal ---------- */
  .exit-confirm-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(5, 7, 12, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .exit-confirm-overlay.show { opacity: 1; pointer-events: auto; }
  .exit-confirm-card {
    background: var(--card2); border: 1px solid var(--border-strong); border-radius: 16px;
    padding: 22px; max-width: 340px; width: 100%; text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    transform: scale(0.95); transition: transform 0.15s ease;
  }
  .exit-confirm-overlay.show .exit-confirm-card { transform: scale(1); }
  .exit-confirm-text { font-size: 0.98rem; font-weight: 600; margin-bottom: 18px; line-height: 1.4; }
  .exit-confirm-buttons { display: flex; gap: 10px; }
  .exit-confirm-buttons button {
    flex: 1; padding: 13px; font-size: 0.92rem; font-weight: 700; font-family: var(--font-display);
    border-radius: 12px; cursor: pointer; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .exit-confirm-buttons button:active { transform: scale(0.95); }
  #exitStayBtn { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  #exitLeaveBtn { background: linear-gradient(180deg, #f0563f, var(--red-dark)); border: none; color: #fff; }

  .loading, .error { text-align: center; padding: 60px 12px; color: var(--muted); }
  .error { color: var(--red); }
  .brand-loading {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 90px 12px;
  }
  .brand-loading .candle-pulse {
    width: 34px; height: 46px;
    position: relative;
    animation: candlePulse 1.1s ease-in-out infinite;
  }
  .brand-loading .candle-pulse::before {
    content: "";
    position: absolute; left: 50%; top: 0; bottom: 0;
    width: 2px; margin-left: -1px;
    background: var(--candle-green);
  }
  .brand-loading .candle-pulse::after {
    content: "";
    position: absolute; left: 50%; top: 30%; height: 40%;
    width: 16px; margin-left: -8px;
    background: var(--candle-green);
    border-radius: 2px;
  }
  @keyframes candlePulse {
    0%, 100% { transform: scaleY(0.85); opacity: 0.6; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  .brand-loading .brand-loading-text {
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--text-dim);
    font-size: 0.95rem;
    letter-spacing: 0.5px;
  }

  #confettiLayer { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; width: 8px; height: 14px; opacity: 0.9; animation: confettiFall linear forwards; }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(540deg); opacity: 0.3; } }

  /* ---------- start screen ---------- */
  .start-screen { text-align: center; padding: 30px 6px 10px; position: relative; }
  .start-wordmark { font-family: var(--font-display); font-size: 2.1rem; font-weight: 700; letter-spacing: -0.5px; }
  .start-sub { color: var(--muted); font-size: 0.95rem; margin: 4px 0 22px; }
  .start-daily-streak {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border); border-radius: 999px;
    padding: 8px 18px; font-weight: 700; font-size: 0.95rem; margin-bottom: 22px;
  }
  .start-daily-streak .win-streak { color: var(--green); font-size: 0.85rem; font-weight: 600; }
  .start-daily-streak .freeze-icons { font-size: 0.9rem; }
  .freeze-notice {
    background: rgba(92, 158, 255, 0.1); border: 1px solid rgba(92, 158, 255, 0.35);
    color: #5c9eff; border-radius: 12px; padding: 10px 14px; font-size: 0.85rem;
    font-weight: 600; margin-bottom: 16px;
  }
  .mode-btn {

<script>
/* ============================= CONSTANTS ============================= */
const DRILLS_PER_SESSION = 10;
const DECISION_SECONDS = 10;
const STARTING_BANKROLL = 10000;
const POSITION_SIZE = 5000;
const PNL_CAP_PCT = 0.03;
const PLAYOUT_START_MS = 700;
const PLAYOUT_END_MS = 250;
const RANGE_PROXIMITY_PCT = 0.0015;
const STORAGE_KEY = "tradeLeeState_v1";

/* ============================= PERSISTED STATE ============================= */
function defaultState() {
  return {
    hasSeenTutorial: false,
    dailyPlayStreak: 0,
    dailyWinStreak: 0,
    lastDailyDate: null,
    lastDailyResult: null,
    lastDailyDrillId: null,
    lastDailyOutcomeCorrect: null,
    lastDailyIsFizzle: null,
    bestSessionPnl: null,
    bestStreakEver: 0,
    totalDrillsAnswered: 0,
    totalCorrect: 0,
    // power-ups economy
    ticks: 0,
    ticksEarnedAllTime: 0,
    ownedFreezes: 0,
    ownedTimeExtends: 0,
    ownedSecondChances: 0,
    ownedDoubleDowns: 0,
    freezeConsumedPending: false,
  };
}
function loadPersistedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) { return defaultState(); }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); } catch (e) {}
}
let appState = loadPersistedState();

/* ============================= APP STATE ============================= */
let allDrills = [];
let sessionDeck = [];
let sessionIndex = 0;
let sessionPnl = 0;
let bankroll = STARTING_BANKROLL;
let streak = 0;
let bestStreak = 0;
let multiplier = 1;
let soundOn = true;
let answered = false;
let timerHandle = null;
let timerDeadline = 0;
let playoutHandle = null;
let autoAdvanceHandle = null;
let sessionResults = [];
let currentMode = null; // 'practice' | 'daily' | 'tutorial'
let currentDrill = null;
let currentDrillMultiplier = 1;
let drillInProgress = false;
let timeExtendUsedThisDrill = false;
let doubleDownActiveThisDrill = false;
let secondChanceUsedThisSession = false;
let preDrillSnapshot = null;

let chart = null, candleSeries = null, volumeSeries = null, vwapSeries = null;
let priceLinesList = [];

/* ============================= AUDIO ============================= */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(freq, duration, type, gainPeak, delay) {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const t0 = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(gainPeak || 0.12, t0 + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.03);
  } catch (e) {}
}
function playTick() { playTone(1150, 0.045, "square", 0.045); }
function playClick() { playTone(500, 0.05, "sine", 0.08); }
function playTimeout() { playTone(200, 0.35, "sawtooth", 0.1); }
function playWin() {
  playTone(880, 0.12, "triangle", 0.13, 0);
  playTone(1108, 0.12, "triangle", 0.13, 0.09);
  playTone(1318, 0.2, "triangle", 0.15, 0.18);
}
function playLoss() {
  playTone(180, 0.28, "sawtooth", 0.11, 0);
  playTone(130, 0.38, "sawtooth", 0.11, 0.09);
}
function playFizzle() { playTone(320, 0.3, "sine", 0.06); }
function playMultiplier() {
  playTone(1500, 0.14, "square", 0.09, 0);
  playTone(2000, 0.2, "square", 0.09, 0.06);
}

/* ============================= TIME / DATE UTIL ============================= */
function toEasternChartTime(unixSeconds) {
  const d = new Date(unixSeconds * 1000);
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York",
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: false,
  }).formatToParts(d);
  const map = {};
  parts.forEach(p => map[p.type] = p.value);
  let hour = parseInt(map.hour, 10);
  if (hour === 24) hour = 0;
  const fakeUtcMs = Date.UTC(
    parseInt(map.year, 10), parseInt(map.month, 10) - 1, parseInt(map.day, 10),
    hour, parseInt(map.minute, 10), parseInt(map.second, 10)
  );
  return Math.floor(fakeUtcMs / 1000);
}
function getEtDateString(offsetDays) {
  const now = new Date(Date.now() + (offsetDays || 0) * 86400000);
  return new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" }).format(now);
}
function getEtDateHuman() {
  return new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", month: "short", day: "numeric", year: "numeric" }).format(new Date());
}
function getEtOffsetMinutes(date) {
  const utcDate = new Date(date.toLocaleString("en-US", { timeZone: "UTC" }));
  const etDate = new Date(date.toLocaleString("en-US", { timeZone: "America/New_York" }));
  return (etDate - utcDate) / 60000;
}
function getNextEtMidnightMs() {
  const etDateStr = getEtDateString(0);
  const [y, m, d] = etDateStr.split("-").map(Number);
  const candidate = Date.UTC(y, m - 1, d + 1, 0, 0, 0);
  const offsetMinutes = getEtOffsetMinutes(new Date(candidate));
  return candidate - offsetMinutes * 60000;
}

function hashString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h;
}
function getDailyDrill() {
  const idx = hashString(getEtDateString(0)) % allDrills.length;
  return allDrills[idx];
}
// Deterministic seeded placeholder — swap this one function for a real API call later.
async function getDailyDistributionPct(dateStr) {
  const h = hashString("dist-" + dateStr);
  return 35 + (h % 51); // 35-85 inclusive
}

/* ============================= UTIL ============================= */
function formatMoney(n) {
  const sign = n < 0 ? "-" : "";
  return sign + "$" + Math.abs(Math.round(n)).toLocaleString("en-US");
}
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function animateNumber(fromVal, toVal, duration, onUpdate, onComplete) {
  const start = performance.now();
  function step(now) {
    const elapsed = now - start;
    const t = Math.min(1, elapsed / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    onUpdate(fromVal + (toVal - fromVal) * eased);
    if (t < 1) requestAnimationFrame(step);
    else { onUpdate(toVal); if (onComplete) onComplete(); }
  }
  requestAnimationFrame(step);
}

/* ============================= PERSISTENCE HELPERS ============================= */
function recordDailyResult(drill, isCorrect, isFizzle) {
  const today = getEtDateString(0);
  const yesterday = getEtDateString(-1);
  if (appState.lastDailyDate === yesterday) appState.dailyPlayStreak = (appState.dailyPlayStreak || 0) + 1;
  else if (appState.lastDailyDate !== today) appState.dailyPlayStreak = 1;

  if (isCorrect) {
    if (appState.lastDailyDate === yesterday && appState.lastDailyResult === "win") {
      appState.dailyWinStreak = (appState.dailyWinStreak || 0) + 1;
    } else {
      appState.dailyWinStreak = 1;
    }
  } else {
    appState.dailyWinStreak = 0;
  }
  appState.lastDailyDate = today;
  appState.lastDailyResult = isCorrect ? "win" : "loss";
  appState.lastDailyDrillId = drill.id;
  appState.lastDailyOutcomeCorrect = isCorrect;
  appState.lastDailyIsFizzle = isFizzle;
  saveState();

  awardTicks(10 + (isCorrect ? 5 : 0));
  if (appState.dailyPlayStreak > 0 && appState.dailyPlayStreak % 5 === 0) {
    awardTicks(50);
  }
}
function incrementGlobalStats(isCorrect) {
  appState.totalDrillsAnswered = (appState.totalDrillsAnswered || 0) + 1;
  if (isCorrect) appState.totalCorrect = (appState.totalCorrect || 0) + 1;
  saveState();
}
function updateBestStreakEver(streakVal) {
  if (streakVal > (appState.bestStreakEver || 0)) { appState.bestStreakEver = streakVal; saveState(); }
}
function updateBestSessionPnl(pnl) {
  if (appState.bestSessionPnl === null || pnl > appState.bestSessionPnl) { appState.bestSessionPnl = pnl; saveState(); return true; }
  return false;
}

/* ============================= TICKS / POWER-UPS ============================= */
function awardTicks(n) {
  appState.ticks = (appState.ticks || 0) + n;
  appState.ticksEarnedAllTime = (appState.ticksEarnedAllTime || 0) + n;
  saveState();
  updateNavStreak();
}
function checkStreakFreeze() {
  const today = getEtDateString(0);
  const yesterday = getEtDateString(-1);
  if (!appState.lastDailyDate || appState.lastDailyDate === today || appState.lastDailyDate === yesterday) return;
  const lastDate = new Date(appState.lastDailyDate + "T00:00:00Z");
  const todayDate = new Date(today + "T00:00:00Z");
  const daysSince = Math.round((todayDate - lastDate) / 86400000);
  const missedDays = daysSince - 1;
  if (missedDays === 1 && (appState.ownedFreezes || 0) > 0) {
    appState.ownedFreezes -= 1;
    appState.lastDailyDate = yesterday; // bridge the single missed day so the streak continues normally
    appState.freezeConsumedPending = true;
    saveState();
  }
}

function renderPowerupBar() {
  const bar = document.getElementById("powerupBar");
  if (!bar) return;
  if (currentMode !== "practice") { bar.classList.add("hidden"); bar.innerHTML = ""; return; }

  const chips = [];
  if (!timeExtendUsedThisDrill && (appState.ownedTimeExtends || 0) > 0) {
    chips.push(`<button class="powerup-chip" id="useTimeExtendBtn">⏱ +5s <span class="chip-count">(${appState.ownedTimeExtends})</span></button>`);
  }
  if (doubleDownActiveThisDrill) {
    chips.push(`<span class="powerup-chip active">💰 2x ACTIVE</span>`);
  } else if ((appState.ownedDoubleDowns || 0) > 0) {
    chips.push(`<button class="powerup-chip" id="useDoubleDownBtn">💰 Double Down <span class="chip-count">(${appState.ownedDoubleDowns})</span></button>`);
  }

  if (!chips.length) { bar.classList.add("hidden"); bar.innerHTML = ""; return; }
  bar.classList.remove("hidden");
  bar.innerHTML = chips.join("");
  const teBtn = document.getElementById("useTimeExtendBtn");
  if (teBtn) teBtn.onclick = useTimeExtend;
  const ddBtn = document.getElementById("useDoubleDownBtn");
  if (ddBtn) ddBtn.onclick = useDoubleDown;
}
function useTimeExtend() {
  if (timeExtendUsedThisDrill || (appState.ownedTimeExtends || 0) <= 0 || answered) return;
  appState.ownedTimeExtends -= 1;
  timeExtendUsedThisDrill = true;
  timerDeadline += 5000;
  saveState();
  renderPowerupBar();
}
function useDoubleDown() {
  if (doubleDownActiveThisDrill || (appState.ownedDoubleDowns || 0) <= 0 || answered) return;
  appState.ownedDoubleDowns -= 1;
  doubleDownActiveThisDrill = true;
  saveState();
  renderPowerupBar();
}

/* ============================= DIFFICULTY RAMP ============================= */
function buildSessionDeck() {
  const pool = shuffleArray(allDrills.slice());
  pool.sort((a, b) => Math.abs(b.volume_ratio - 1) - Math.abs(a.volume_ratio - 1));
  const tercile = Math.floor(pool.length / 3);
  const obvious = shuffleArray(pool.slice(0, tercile));
  const hardest = shuffleArray(pool.slice(pool.length - tercile));
  const middle = shuffleArray(pool.slice(tercile, pool.length - tercile));
  return [...obvious.slice(0, 3), ...middle.slice(0, 4), ...hardest.slice(0, 3)];
}

/* ============================= CHART HELPERS ============================= */
function addSeriesCompat(chartObj, seriesTypeName, options, paneIndex) {
  const legacyMethod = "add" + seriesTypeName + "Series";
  if (typeof chartObj[legacyMethod] === "function") return chartObj[legacyMethod](options);
  return chartObj.addSeries(LightweightCharts[seriesTypeName + "Series"], options, paneIndex);
}
function initChart(container) {
  chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: container.clientHeight,
    layout: { background: { type: "solid", color: "#141922" }, textColor: "#c9d1d9" },
    grid: { vertLines: { color: "#1d2330" }, horzLines: { color: "#1d2330" } },
    timeScale: { timeVisible: true, secondsVisible: false, borderColor: "#262b36", rightOffset: 8 },
    rightPriceScale: { borderColor: "#262b36" },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  });
  candleSeries = addSeriesCompat(chart, "Candlestick", {
    upColor: "#26a69a", downColor: "#ef5350", borderVisible: false,
    wickUpColor: "#26a69a", wickDownColor: "#ef5350",
  }, 0);
  candleSeries.priceScale().applyOptions({ scaleMargins: { top: 0.06, bottom: 0.06 } });
  volumeSeries = addSeriesCompat(chart, "Histogram", { priceFormat: { type: "volume" } }, 1);
  vwapSeries = addSeriesCompat(chart, "Line", { color: "#c792ea", lineWidth: 2, priceLineVisible: false, lastValueVisible: false }, 0);
  try {
    const panes = chart.panes();
    panes[1].setHeight(Math.round(container.clientHeight * 0.32));
  } catch (e) {}
}
function clearPriceLines() {
  for (const l of priceLinesList) { try { candleSeries.removePriceLine(l); } catch (e) {} }
  priceLinesList = [];
}
function addPriceLine(price, color, showAxisLabel) {
  if (price === null || price === undefined) return;
  // no native `title` — the in-pane title label collides with candles/other
  // labels when lines sit close together, so labels are drawn as custom
  // HTML pinned to the chart's right edge instead (see updateRangeLabels).
  const l = candleSeries.createPriceLine({ price, color, lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: showAxisLabel !== false });
  priceLinesList.push(l);
}
function updateRangeZone(drill) {
  const zone = document.getElementById("rangeZone");
  if (!zone || !candleSeries) return;
  const yHigh = candleSeries.priceToCoordinate(drill.range_high);
  const yLow = candleSeries.priceToCoordinate(drill.range_low);
  if (yHigh === null || yLow === null) return;
  zone.style.top = Math.min(yHigh, yLow) + "px";
  zone.style.height = Math.max(2, Math.abs(yLow - yHigh)) + "px";
}
function updateRangeLabels(drill) {
  const highEl = document.getElementById("rangeHighLabel");
  const lowEl = document.getElementById("rangeLowLabel");
  if (!highEl || !lowEl || !candleSeries) return;
  const yHigh = candleSeries.priceToCoordinate(drill.range_high);
  const yLow = candleSeries.priceToCoordinate(drill.range_low);
  if (yHigh === null || yLow === null) {
    highEl.classList.add("hidden");
    lowEl.classList.add("hidden");
    return;
  }
  highEl.classList.remove("hidden");
  lowEl.classList.remove("hidden");
  highEl.textContent = `RANGE HIGH ${drill.range_high.toFixed(2)}`;
  lowEl.textContent = `RANGE LOW ${drill.range_low.toFixed(2)}`;
  let highTop, lowTop;
  if (Math.abs(yHigh - yLow) < 22) {
    // lines too close together to each carry their own label at the line's
    // height — stack one above, one below, so they never overlap each other
    const mid = (yHigh + yLow) / 2;
    highTop = mid - 20;
    lowTop = mid + 4;
  } else {
    highTop = yHigh - 9;
    lowTop = yLow - 9;
  }
  highEl.style.top = Math.max(2, highTop) + "px";
  lowEl.style.top = Math.max(2, lowTop) + "px";
}
function pulseRangeZone() {
  const zone = document.getElementById("rangeZone");
  if (!zone) return;
  zone.classList.add("pulse");
  clearTimeout(zone._pulseTimeout);
  zone._pulseTimeout = setTimeout(() => zone.classList.remove("pulse"), 380);
}
function positionFormingMarker(drill) {
  const marker = document.getElementById("formingMarker");
  if (!marker || !candleSeries || !chart) return;
  const lastCandle = drill.candles[drill.candles.length - 1];
  const x = chart.timeScale().timeToCoordinate(toEasternChartTime(lastCandle.time));
  const y = candleSeries.priceToCoordinate(lastCandle.high);
  if (x === null || y === null) return;
  marker.style.right = "auto";
  marker.style.left = Math.max(4, x - marker.offsetWidth / 2) + "px";
  marker.style.top = Math.max(4, y - marker.offsetHeight - 12) + "px";
}

/* ============================= P&L ============================= */
function computePnl(drill, isCorrect, mult) {
  const rangeMid = (drill.range_high + drill.range_low) / 2;
  let magnitudePct;
  if (drill.outcome === "real") {
    magnitudePct = Math.abs((drill.resolved_price - drill.breakout_price) / drill.breakout_price);
  } else {
    magnitudePct = Math.abs((drill.breakout_price - rangeMid) / drill.breakout_price);
  }
  const capped = Math.min(magnitudePct, PNL_CAP_PCT);
  return POSITION_SIZE * capped * (isCorrect ? 1 : -1) * mult;
}

/* ============================= GAME SCREEN CHROME ============================= */
function renderGameScreen(mode) {
  currentMode = mode;

  addPriceLine(drill.range_low, "#f5b400", false);

/* ============================= TIMER ============================= */
function startTimer() {
  clearTimer();
  timerDeadline = performance.now() + DECISION_SECONDS * 1000;
  const fill = document.getElementById("timerFill");
  function tick() {
    if (answered) return;
    const remaining = timerDeadline - performance.now();
    const pct = Math.max(0, remaining / (DECISION_SECONDS * 1000));
    fill.style.width = (pct * 100) + "%";
    fill.classList.toggle("warn", remaining <= 5000 && remaining > 3000);
    fill.classList.toggle("danger", remaining <= 3000);
    if (remaining <= 0) { handleTimeout(); return; }
    timerHandle = requestAnimationFrame(tick);
  }
  timerHandle = requestAnimationFrame(tick);
}
function clearTimer() { if (timerHandle) cancelAnimationFrame(timerHandle); timerHandle = null; }
function disableButtons() {
  const r = document.getElementById("realBtn"), f = document.getElementById("fakeBtn");
  if (r) r.disabled = true;
  if (f) f.disabled = true;
}
function hideFormingMarker() {
  const m = document.getElementById("formingMarker");
  if (m) m.classList.add("hidden");
}

function handleTimeout() {
  if (answered) return;
  answered = true;
  clearTimer();
  hideFormingMarker();
  disableButtons();
  playTimeout();
  if (currentMode === "practice") {
    streak = 0; multiplier = 1;
    updateStreakDisplay();
    sessionResults.push({ pnl: 0, correct: null, skipped: true });
  }
  const skipMsg = document.getElementById("skipMessage");
  if (skipMsg) skipMsg.classList.remove("hidden");
  autoAdvanceHandle = setTimeout(() => {
    if (currentMode === "practice") advanceOrEnd();
    else if (currentMode === "daily") renderStartScreen();
    else renderStartScreen();
  }, 1500);
}

/* ============================= ANSWER + PLAYOUT ============================= */
function answer(choice) {
  if (answered) return;
  answered = true;
  clearTimer();
  hideFormingMarker();
  disableButtons();
  playClick();
  startPlayout(currentDrill, choice);
}

function startPlayout(drill, choice) {
  const playoutCandles = drill.playout_candles || [];
  const stopIndex = (drill.resolution_bar_index !== null && drill.resolution_bar_index !== undefined) ? drill.resolution_bar_index : playoutCandles.length - 1;
  const totalSteps = Math.max(1, Math.min(stopIndex, playoutCandles.length - 1) + 1);
  let i = 0;
  function stepFn() {
    if (i >= playoutCandles.length || i > stopIndex) { finishPlayout(drill, choice); return; }
    const c = playoutCandles[i];
    const vwapIdx = drill.candles.length + i;
    candleSeries.update({ time: toEasternChartTime(c.time), open: c.open, high: c.high, low: c.low, close: c.close });
    volumeSeries.update({ time: toEasternChartTime(c.time), value: c.volume, color: c.close >= c.open ? "rgba(38,166,154,0.7)" : "rgba(239,83,80,0.7)" });
    if (vwapIdx < drill.vwap.length) vwapSeries.update({ time: toEasternChartTime(drill.vwap[vwapIdx].time), value: drill.vwap[vwapIdx].value });
    playTick();

    const distHigh = Math.abs(c.close - drill.range_high) / drill.range_high;
    const distLow = Math.abs(c.close - drill.range_low) / drill.range_low;
    if (Math.min(distHigh, distLow) <= RANGE_PROXIMITY_PCT) pulseRangeZone();

    chart.timeScale().fitContent();
    updateRangeZone(drill);
    updateRangeLabels(drill);

    i++;
    const progress = i / totalSteps;
    const delay = PLAYOUT_START_MS - (PLAYOUT_START_MS - PLAYOUT_END_MS) * Math.min(1, progress);
    playoutHandle = setTimeout(stepFn, delay);
  }
  stepFn();
}

  const el = document.getElementById("streakValue");

function triggerStreakShatter() {

  if (!el) return;

  void el.offsetWidth;
  el.classList.add("shatter");
}
function updateStreakAndMultiplier(isCorrect) {
  if (isCorrect) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    const newMult = streak >= 5 ? 3 : streak >= 3 ? 2 : 1;
    if (newMult !== multiplier) {
      multiplier = newMult;
      if (multiplier > 1) showMultiplierBadge(multiplier);
    }
  } else {
    triggerStreakShatter();
    streak = 0;
    multiplier = 1;
  }
  updateStreakDisplay();
}

function coachWhyText(drill) {
  if (drill.context) return drill.context;
  return "No standout signal here — this one came down to feel.";
}

function applyResultJuice(isCorrect, isFizzle) {
  const chartCard = document.getElementById("chartCard");
  const chartContainer = document.getElementById("chartContainer");
  if (isFizzle) {
    chartContainer.classList.add("fizzle-fade");
    playFizzle();
  } else if (isCorrect) {
    chartCard.classList.add("zoom-pulse");
    playWin();
  } else {
    chartCard.classList.add("shake");
    chartContainer.classList.add("desaturate");
    playLoss();
    setTimeout(() => chartContainer.classList.remove("desaturate"), 450);
  }
}

/* ============================= RESOLUTION ============================= */
function finishPlayout(drill, choice) {
  const isCorrect = choice === drill.outcome;
  const isFizzle = drill.outcome === "fake" && drill.reversal_minutes === null && drill.resolution_bar_index === null;

  applyResultJuice(isCorrect, isFizzle);

  if (currentMode === "practice") {
    updateStreakAndMultiplier(isCorrect);
    const doubleDownMult = doubleDownActiveThisDrill ? 2 : 1;
    const pnl = computePnl(drill, isCorrect, currentDrillMultiplier * doubleDownMult);
    sessionResults.push({ pnl, correct: isCorrect, skipped: false, doubledDown: doubleDownActiveThisDrill });
    incrementGlobalStats(isCorrect);

    const prevBankroll = bankroll, prevSessionPnl = sessionPnl;
    bankroll += pnl; sessionPnl += pnl;

    const bankrollEl = document.getElementById("bankrollValue");
    const pnlEl = document.getElementById("pnlValue");
    animateNumber(prevBankroll, bankroll, 600, v => bankrollEl.textContent = formatMoney(v));
    animateNumber(prevSessionPnl, sessionPnl, 600, v => {
      pnlEl.textContent = formatMoney(v);
      pnlEl.classList.toggle("pnl-up", v >= 0);
      pnlEl.classList.toggle("pnl-down", v < 0);
    });
    bankrollEl.classList.add(pnl >= 0 ? "flash-green" : "flash-red");
    setTimeout(() => bankrollEl.classList.remove("flash-green", "flash-red"), 700);

    showCoachCard(drill, isCorrect, pnl, isFizzle);
  } else if (currentMode === "daily") {
    incrementGlobalStats(isCorrect);
    recordDailyResult(drill, isCorrect, isFizzle);
    updateNavStreak();
    setTimeout(() => renderDailyResultScreen(drill, isCorrect, isFizzle), 350);
  } else if (currentMode === "tutorial") {
    setTimeout(() => renderTutorialOutro(), 600);
  }
}

function showCoachCard(drill, isCorrect, pnl, isFizzle) {
  const card = document.getElementById("coachCard");
  const outcomeEl = document.getElementById("coachOutcome");
  const whyEl = document.getElementById("coachWhy");
  const pnlEl = document.getElementById("coachPnl");

  let outcomeText;
  if (isFizzle) {
    outcomeText = "No follow-through — sometimes the market just naps 😴";
    outcomeEl.className = "coach-outcome neutral";
  } else if (drill.outcome === "real") {
    outcomeText = `Ran +${drill.extension_multiple}x the range ✅`;
    outcomeEl.className = "coach-outcome " + (isCorrect ? "correct" : "wrong");
  } else {
    outcomeText = `Failed — back inside in ${drill.reversal_minutes} min ❌`;
    outcomeEl.className = "coach-outcome " + (isCorrect ? "correct" : "wrong");
  }
  outcomeEl.textContent = outcomeText;
  whyEl.textContent = coachWhyText(drill);
  pnlEl.textContent = (pnl >= 0 ? "+" : "") + formatMoney(pnl);
  pnlEl.className = "coach-pnl " + (pnl >= 0 ? "pos" : "neg");

  card.classList.remove("hidden");

  const existingSecondChance = document.getElementById("secondChanceBtn");
  if (existingSecondChance) existingSecondChance.remove();

  const canOfferSecondChance = currentMode === "practice" && !isCorrect && !secondChanceUsedThisSession && (appState.ownedSecondChances || 0) > 0;
  if (canOfferSecondChance) {
    const btn = document.createElement("button");
    btn.className = "second-chance-btn";

function useSecondChance() {
  if (secondChanceUsedThisSession || (appState.ownedSecondChances || 0) <= 0) return;
  appState.ownedSecondChances -= 1;
  secondChanceUsedThisSession = true;
  saveState();
  clearTimeout(autoAdvanceHandle);

  sessionResults.pop();
  streak = preDrillSnapshot.streak;
  multiplier = preDrillSnapshot.multiplier;
  bankroll = preDrillSnapshot.bankroll;
  sessionPnl = preDrillSnapshot.sessionPnl;
  updateStreakDisplay();
  const bankrollEl = document.getElementById("bankrollValue");
  if (bankrollEl) bankrollEl.textContent = formatMoney(bankroll);
  const pnlEl = document.getElementById("pnlValue");
  if (pnlEl) {
    pnlEl.textContent = formatMoney(sessionPnl);
    pnlEl.classList.toggle("pnl-up", sessionPnl >= 0);
    pnlEl.classList.toggle("pnl-down", sessionPnl < 0);
  }

  const usedIds = new Set(sessionDeck.map(d => d.id));
  const candidates = allDrills.filter(d => !usedIds.has(d.id));
  const replacement = candidates.length ? candidates[Math.floor(Math.random() * candidates.length)] : currentDrill;
  sessionDeck[sessionIndex] = replacement;
  loadDrill(replacement);
}

  const card = document.getElementById("chartCard");
  const callout = document.createElement("div");
  callout.id = "tutorialCallout";
  callout.className = "tutorial-callout " + step.arrow;
  callout.innerHTML = `
    <div class="callout-text">${step.text}</div>
    <button class="callout-next" id="calloutNext">${stepIndex === TUTORIAL_STEPS.length - 1 ? "Your call →" : "Got it →"}</button>
  `;
  card.insertAdjacentElement("afterend", callout);
  document.getElementById("calloutNext").onclick = () => showTutorialStep(stepIndex + 1);
}
function skipTutorial() {
  appState.hasSeenTutorial = true;
  saveState();
  clearTimer();
  clearTimeout(playoutHandle);
  clearTimeout(autoAdvanceHandle);
  goToStartOrDeepLink();
}
function renderTutorialOutro() {
  appState.hasSeenTutorial = true;
  saveState();
  setDrillInProgress(false);
  const root = document.getElementById("screenRoot");
  root.innerHTML = `
    <div class="tutorial-outro">
      <div class="outro-emoji">🎉</div>
      <h2>That's the game.</h2>
      <p>New drill every day.</p>
      <button class="mode-btn practice-btn" id="outroContinue">LET'S GO</button>
    </div>
  `;
  document.getElementById("outroContinue").onclick = goToStartOrDeepLink;
}

/* ============================= START SCREEN ============================= */
function renderStartScreen() {
  currentMode = null;
  setDrillInProgress(false);
  clearTimer();
  clearTimeout(playoutHandle);
  clearTimeout(autoAdvanceHandle);
  clearInterval(window.__countdownInterval);

  const today = getEtDateString(0);
  const alreadyPlayedDaily = appState.lastDailyDate === today;
  const accuracy = appState.totalDrillsAnswered ? Math.round(100 * appState.totalCorrect / appState.totalDrillsAnswered) : 0;
  const showFreezeNotice = !!appState.freezeConsumedPending;
  if (showFreezeNotice) { appState.freezeConsumedPending = false; saveState(); }

  const root = document.getElementById("screenRoot");
  root.innerHTML = `
    <div class="start-screen">
      <div class="start-wordmark">📈 Trade Lee</div>
      <div class="start-sub">Can you spot the real breakout?</div>

      ${showFreezeNotice ? `<div class="freeze-notice">🧊 Streak saved by freeze! Your streak didn't reset.</div>` : ""}

      <div class="start-daily-streak">
        <span>🔥</span> ${appState.dailyPlayStreak || 0} day streak
        ${appState.dailyWinStreak > 0 ? `<span class="win-streak">· ${appState.dailyWinStreak} win streak</span>` : ""}
        ${appState.ownedFreezes > 0 ? `<span class="freeze-icons">${"🧊".repeat(appState.ownedFreezes)}</span>` : ""}
      </div>

      <button class="mode-btn daily-btn ${alreadyPlayedDaily ? "done" : ""}" id="dailyBtn">
        ${alreadyPlayedDaily ? "DAILY DRILL ✓ DONE — VIEW RESULT" : "DAILY DRILL"}
      </button>
      <button class="mode-btn practice-btn" id="practiceBtn">PRACTICE — 10 DRILL SESSION</button>

      <div class="start-stats-row">
        <div class="mini-stat"><div class="v">${accuracy}%</div><div class="l">Accuracy</div></div>
        <div class="mini-stat"><div class="v">${appState.bestStreakEver || 0}</div><div class="l">Best Streak</div></div>
        <a class="mini-stat" href="/powerups/"><div class="v">⚡ ${appState.ticks || 0}</div><div class="l">Ticks</div></a>
      </div>
    </div>
  `;
  document.getElementById("dailyBtn").onclick = handleDailyButtonClick;
  document.getElementById("practiceBtn").onclick = startNewPracticeSession;
}

/* ============================= SHARE CARD ============================= */
function drawMiniChart(ctx, candles, x, y, w, h) {
  if (!candles || !candles.length) return;
  let min = Infinity, max = -Infinity;
  candles.forEach(c => { min = Math.min(min, c.low); max = Math.max(max, c.high); });
  const range = (max - min) || 1;
  const n = candles.length;
  const candleW = w / n;
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.04)";
  ctx.fillRect(x, y, w, h);
  candles.forEach((c, i) => {
    const cx = x + i * candleW + candleW / 2;
    const yHigh = y + h - ((c.high - min) / range) * h;
    const yLow = y + h - ((c.low - min) / range) * h;
    const yOpen = y + h - ((c.open - min) / range) * h;
    const yClose = y + h - ((c.close - min) / range) * h;
    const up = c.close >= c.open;
    ctx.strokeStyle = up ? "#26a69a" : "#ef5350";
    ctx.fillStyle = up ? "#26a69a" : "#ef5350";
    ctx.lineWidth = Math.max(1, candleW * 0.15);
    ctx.beginPath(); ctx.moveTo(cx, yHigh); ctx.lineTo(cx, yLow); ctx.stroke();
    const bodyTop = Math.min(yOpen, yClose);
    const bodyH = Math.max(2, Math.abs(yClose - yOpen));
    ctx.fillRect(cx - candleW * 0.35, bodyTop, candleW * 0.7, bodyH);
  });
  ctx.restore();
}
function generateShareCanvas(mode, data) {
  const canvas = document.createElement("canvas");
  canvas.width = 1080; canvas.height = 1920;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createLinearGradient(0, 0, 0, 1920);
  grad.addColorStop(0, "#141922"); grad.addColorStop(1, "#0b0e14");
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1920);

  ctx.textAlign = "center";
  ctx.fillStyle = "#e6e9ef";
  ctx.font = "700 68px -apple-system, Arial, sans-serif";
  ctx.fillText("📈 Trade Lee", 540, 170);
  ctx.font = "400 32px Arial, sans-serif";
  ctx.fillStyle = "#8b95a7";
  ctx.fillText(getEtDateHuman(), 540, 220);

  if (mode === "daily") {
    ctx.font = "900 120px Arial, sans-serif";
    ctx.fillStyle = data.isCorrect ? "#22c55e" : "#ef4444";
    ctx.fillText(data.isCorrect ? "WIN ✅" : "LOSS ❌", 540, 440);
    ctx.font = "700 52px Arial, sans-serif";
    ctx.fillStyle = "#f5b400";
    ctx.fillText(`🔥 ${appState.dailyPlayStreak} day streak`, 540, 530);
    drawMiniChart(ctx, data.drill.candles, 140, 650, 800, 480);
  } else {
    ctx.font = "900 110px Arial, sans-serif";
    ctx.fillStyle = data.sessionPnl >= 0 ? "#22c55e" : "#ef4444";
    ctx.fillText((data.sessionPnl >= 0 ? "+" : "") + formatMoney(data.sessionPnl), 540, 440);
    ctx.font = "400 32px Arial, sans-serif";
    ctx.fillStyle = "#8b95a7";
    ctx.fillText("Session P&L", 540, 490);
    ctx.font = "700 50px Arial, sans-serif";
    ctx.fillStyle = "#e6e9ef";
    ctx.fillText(`${data.correctCount}/10 correct`, 540, 620);
    ctx.fillText(`Best streak: ${data.bestStreak}`, 540, 700);
  }

  ctx.font = "400 30px Arial, sans-serif";
  ctx.fillStyle = "#8b95a7";
  ctx.fillText("Can you spot the real breakout?", 540, 1800);
  return canvas;
}
function generateAndShareCard(mode, data) {
  const canvas = generateShareCanvas(mode, data);
  canvas.toBlob(async (blob) => {
    const fileName = `trade-lee-${getEtDateString(0)}.png`;
    try {
      const file = new File([blob], fileName, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "Trade Lee", text: "Can you spot the real breakout?" });
        return;
      }
    } catch (e) {}
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }, "image/png");
}

/* ============================= NAV ============================= */
function updateNavStreak() {
  const el = document.getElementById("navStreakFlame");
  if (el) {
    if (appState.dailyPlayStreak > 0) {
      el.textContent = `🔥 ${appState.dailyPlayStreak}`;
      el.classList.remove("hidden");
    } else {
      el.classList.add("hidden");
    }
  }
  const ticksEl = document.getElementById("navTicks");
  if (ticksEl) ticksEl.textContent = `⚡ ${appState.ticks || 0}`;
}
function setDrillInProgress(value) {
  drillInProgress = value;
  const btn = document.getElementById("exitBtn");
  if (btn) btn.classList.toggle("hidden", !drillInProgress);
}
function handleExitClick() {
  if (drillInProgress) {
    document.getElementById("exitConfirmOverlay").classList.add("show");
  } else {
    renderStartScreen();
  }
}
function confirmExitDrill() {
  document.getElementById("exitConfirmOverlay").classList.remove("show");
  clearTimer();
  clearTimeout(playoutHandle);
  clearTimeout(autoAdvanceHandle);
  if (currentMode === "practice") {
    streak = 0;
    multiplier = 1;
    sessionResults.push({ pnl: 0, correct: null, skipped: true });
  }
  renderStartScreen();
}
function cancelExitDrill() {
  document.getElementById("exitConfirmOverlay").classList.remove("show");
}
document.getElementById("soundToggle").onclick = toggleSound;
document.getElementById("exitBtn").onclick = handleExitClick;
document.getElementById("exitStayBtn").onclick = cancelExitDrill;
document.getElementById("exitLeaveBtn").onclick = confirmExitDrill;

/* ============================= DEEP LINKS ============================= */
let pendingDeepLinkMode = (function () {
  const m = new URLSearchParams(location.search).get("mode");
  return (m === "daily" || m === "practice") ? m : null;
})();
function goToStartOrDeepLink() {
  const mode = pendingDeepLinkMode;
  pendingDeepLinkMode = null;
  if (mode === "daily") handleDailyButtonClick();
  else if (mode === "practice") startNewPracticeSession();
  else renderStartScreen();
}

/* ============================= INIT ============================= */
async function init() {
  try {
    const res = await fetch("../drills/drills.json", { cache: "no-store" });
    if (!res.ok) throw new Error("drills.json not found");
    allDrills = await res.json();
    if (!allDrills.length) throw new Error("No drills in drills.json");
    checkStreakFreeze();
    updateNavStreak();
    if (!appState.hasSeenTutorial) renderTutorialIntro();
    else goToStartOrDeepLink();
  } catch (e) {
    document.getElementById("screenRoot").innerHTML = `
      <div class="error">
        Failed to load drills: ${e.message}<br><br>
        Make sure you're running a local server (not opening the file directly),
        and that drills/drills.json exists.
      </div>`;
  }
}
init();
</script>
