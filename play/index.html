              appState.speedRunBestTimeMs = result.merged.best_speedrun_time_ms;
              appState.speedRunBestAccuracy = result.merged.best_speedrun_accuracy || 0;
              appState.practiceTimerSeconds = result.merged.practice_timer_seconds || PRACTICE_TIMER_START;
              if (result.merged.onboarding_profile) appState.onboardingProfile = result.merged.onboarding_profile;
              if (result.merged.chart_settings) appState.chartSettings = result.merged.chart_settings;
              appState.lswStats = { totalAnswered: result.merged.lsw_total_answered || 0, totalCorrect: result.merged.lsw_total_correct || 0 };
              appState.orderTrainerStats = { totalOrders: result.merged.ot_total_orders || 0, filled: result.merged.ot_total_filled || 0, wins: result.merged.ot_total_wins || 0 };
              appState.strategyPackStats = { totalAnswered: result.merged.sp_total_answered || 0, totalCorrect: result.merged.sp_total_correct || 0 };
              appState.dailyPlayStreak = recomputed.dailyPlayStreak;
              appState.dailyWinStreak = recomputed.dailyWinStreak;
              if (recomputed.lastDailyDate) appState.lastDailyDate = recomputed.lastDailyDate;
              if (recomputed.lastDailyResult) appState.lastDailyResult = recomputed.lastDailyResult;
              saveState();
              updateNavStreak();
            }
            renderNavAccountChip();
            renderDailySigninPrompt();
            renderEodSigninPrompt();
          },
        });
      } else {
        renderNavAccountChip();
        renderDailySigninPrompt();
        renderEodSigninPrompt();
      }
    } else if (event === "SIGNED_OUT") {
      renderNavAccountChip();
      renderDailySigninPrompt();
      renderEodSigninPrompt();
    }
  });
}

/* ============================= NAV ============================= */
function updateNavStreak() {
  const el = document.getElementById("navStreakFlame");
  if (el) {
    if (appState.dailyPlayStreak > 0) {
      const big = appState.dailyPlayStreak >= 5 ? " big" : "";
      animateStatNumber(el, appState.dailyPlayStreak, { html: true, format: v => `<span class="flame-icon${big}">🔥</span> ${Math.round(v)}` });
      el.classList.remove("hidden");
    } else {
      el.classList.add("hidden");
    }
  }
  const ticksEl = document.getElementById("navTicks");
  if (ticksEl) animateStatNumber(ticksEl, appState.ticks || 0, { format: v => `⚡ ${Math.round(v)}` });
}
function setDrillInProgress(value) {
  drillInProgress = value;
  const btn = document.getElementById("exitBtn");
  if (btn) btn.classList.toggle("hidden", !drillInProgress);
  const strip = document.getElementById("sessionProgressStrip");
  if (strip) strip.classList.toggle("hidden", !value || currentMode === "ordertrainer");
  if (!value) { const fill = document.getElementById("sessionProgressFill"); if (fill) fill.style.width = "0%"; }
}
function updateSessionProgressStrip() {
  const fill = document.getElementById("sessionProgressFill");
  if (!fill || !sessionDeck.length) return;
  fill.style.width = Math.min(100, Math.round((sessionIndex / sessionDeck.length) * 100)) + "%";
}
function handleExitClick() {
  if (drillInProgress) {
    document.getElementById("exitConfirmOverlay").classList.add("show");
  } else {
    renderStartScreen();
  }
}
function confirmExitDrill() {
  document.getElementById("exitConfirmOverlay").classList.remove("show");
  clearTimer();
  clearTimeout(playoutHandle);
  clearTimeout(autoAdvanceHandle);
  if (currentMode === "practice") {
    streak = 0;
    multiplier = 1;
    sessionResults.push({ pnl: 0, correct: null, skipped: true });
  }
  renderStartScreen();
}
function cancelExitDrill() {
  document.getElementById("exitConfirmOverlay").classList.remove("show");
}
document.getElementById("soundToggle").onclick = toggleSound;
document.addEventListener("click", (e) => {
  const panel = document.getElementById("chartSettingsPanel");
  const gear = document.getElementById("chartSettingsGear");
  if (panel && !panel.classList.contains("hidden") && !panel.contains(e.target) && e.target !== gear) {
    panel.classList.add("hidden");
  }
});
document.getElementById("exitBtn").onclick = handleExitClick;
document.getElementById("exitStayBtn").onclick = cancelExitDrill;
document.getElementById("exitLeaveBtn").onclick = confirmExitDrill;

/* ============================= DEEP LINKS ============================= */
let pendingDeepLinkMode = (function () {
  const m = new URLSearchParams(location.search).get("mode");
  return (m === "daily" || m === "practice" || m === "ordertrainer" || m === "longshortwait") ? m : null;
})();
const pendingChallengeId = new URLSearchParams(location.search).get("challenge");
const pendingReview = new URLSearchParams(location.search).get("review") === "1";
const pendingStrategyPack = new URLSearchParams(location.search).get("strategyPack");
const pendingViewWrapped = new URLSearchParams(location.search).get("viewWrapped") === "1";
function goToStartOrDeepLink() {
  const mode = pendingDeepLinkMode;
  pendingDeepLinkMode = null;
  if (pendingReview && appState.missedDrills.length) { history.replaceState(null, "", location.pathname); startMissReview(); }
  else if (pendingStrategyPack && STRATEGY_PACKS.some(p => p.key === pendingStrategyPack)) { startStrategyPackSession(pendingStrategyPack); }
  else if (pendingViewWrapped && appState.lastWrappedRecap) { history.replaceState(null, "", location.pathname); renderMonthlyWrapped(appState.lastWrappedRecap); }
  else if (mode === "daily") handleDailyButtonClick();
  else if (mode === "practice") startNewPracticeSession();
  else if (mode === "ordertrainer" || mode === "longshortwait") { appState.drillStyle = mode; saveState(); startNewPracticeSession(); }
  else if (!maybeShowYesterdaysReveal()) proceedFromBootChecks();
}
function proceedFromBootChecks() {
  const recap = checkMonthlyWrapped();
  if (recap) { renderMonthlyWrapped(recap); return; }
  renderStartScreen();
}

/* ---- Yesterday's Reveal: first screen a returning player sees, once per day ---- */
function maybeShowYesterdaysReveal() {
  const today = getEtDateString(0);
  if (appState.lastRevealShownDate === today) return false;
  appState.lastRevealShownDate = today;
  saveState();
  renderYesterdaysReveal();
  return true;
}
async function renderYesterdaysReveal() {
  const yesterday = getEtDateString(-1);
  const playedYesterday = appState.lastDailyDate === yesterday;
  const root = document.getElementById("screenRoot");
  root.innerHTML = `
    <div class="reveal-screen">
      <div class="reveal-card">
        <div class="reveal-badge">YESTERDAY'S DROP</div>
        <p class="reveal-text" id="revealText">Loading…</p>
        <button class="mode-btn practice-btn" id="revealContinueBtn">CONTINUE →</button>
      </div>
    </div>
  `;
  document.getElementById("revealContinueBtn").onclick = proceedFromBootChecks;

  const [pct, topStreak] = await Promise.all([
    authReady() ? tlFetchDailyPercentile(yesterday) : Promise.resolve(null),
    authReady() ? tlFetchTopDailyStreak() : Promise.resolve(null),
  ]);

  const parts = [];
  parts.push(pct === null ? "No data yet for yesterday's Drop." : `${(100 - pct).toFixed(1)}% of traders got trapped.`);
  if (playedYesterday) parts.push(`You ${appState.lastDailyResult === "win" ? "got it ✅" : "got trapped ❌"}.`);
  parts.push(topStreak ? `Longest active streak: ${escapeHtml(topStreak.name)} (${topStreak.streak} days).` : "Be the first name on the board.");

  const textEl = document.getElementById("revealText");
  if (textEl) textEl.innerHTML = parts.join(" ");
}

/* ============================= INIT ============================= */
async function init() {
  try {
    const res = await fetch("../drills/drills.json", { cache: "no-store" });
    if (!res.ok) throw new Error("drills.json not found");
    allDrills = await res.json();
    if (!allDrills.length) throw new Error("No drills in drills.json");
    checkStreakFreeze();
    checkComebackBonus();
    updateNavStreak();
    initAccountSync();
    if (pendingChallengeId) loadChallengeFromUrl(pendingChallengeId);
    else if (!appState.hasSeenTutorial) renderOnboardingQuiz();
    else goToStartOrDeepLink();
  } catch (e) {
    document.getElementById("screenRoot").innerHTML = `
      <div class="error">
        Failed to load drills: ${e.message}<br><br>
        Make sure you're running a local server (not opening the file directly),
        and that drills/drills.json exists.
      </div>`;
  }
}
init();
</script>
