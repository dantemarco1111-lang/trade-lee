<style>
  :root {
    --card: var(--surface);
    --card2: var(--surface-2);
    --muted: var(--text-dim);
    --yellow: var(--gold);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior-y: contain;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 12px 16px;
    position: relative;
  }

  /* ---------- persistent nav ---------- */
  .site-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 2px 10px;
    max-width: 480px;
    margin: 0 auto;
  }
  .site-nav .nav-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .site-nav a.nav-wordmark {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .exit-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 8px 10px;
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), color 0.15s ease;
  }
  .exit-btn:hover { color: var(--text); }
  .exit-btn:active { transform: scale(0.94); }
  .exit-btn.hidden { display: none; }
  .site-nav .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @media (min-width: 860px) {
    #app, .site-nav { max-width: 860px; }
  }
  .nav-streak {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--gold);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 10px;
  }
  .nav-streak.hidden { display: none; }
  a.nav-streak.nav-ticks { text-decoration: none; cursor: pointer; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1); }
  a.nav-streak.nav-ticks:active { transform: scale(0.93); }
  button.nav-streak.nav-account { cursor: pointer; font-family: var(--font-body); transition: transform 0.15s cubic-bezier(.34,1.56,.64,1); }
  button.nav-streak.nav-account:active { transform: scale(0.93); }
  .flame-icon { display: inline-block; animation: flameFlicker 2.6s ease-in-out infinite; }
  .flame-icon.big { font-size: 1.15em; }
  @keyframes flameFlicker {
    0%, 100% { opacity: 1; transform: scale(1); }
    25% { opacity: 0.85; transform: scale(0.96); }
    50% { opacity: 1; transform: scale(1.05); }
    75% { opacity: 0.9; transform: scale(0.98); }
  }
  @media (prefers-reduced-motion: reduce) { .flame-icon { animation: none; } }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 2px 0 6px;
  }
  .bankroll { text-align: center; }
  .bankroll-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    font-family: var(--font-body);
  }
  .bankroll-value {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-data);
    transition: color 0.2s;
  }
  .bankroll-value.flash-green { color: var(--green); }
  .bankroll-value.flash-red { color: var(--red); }
  .icon-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 38px; height: 38px;
    font-size: 1.1rem;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .icon-btn:active { transform: scale(0.92); }

  /* ---------- stats bar: one cohesive terminal readout ---------- */
  .statsbar {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 2px;
    margin-bottom: 6px;
  }
  .stat-chip {
    flex: 1;
    position: relative;
    padding: 2px 4px;
    text-align: center;
  }
  .stat-chip:not(:last-child)::after {
    content: "";
    position: absolute;
    right: 0; top: 12%; bottom: 12%;
    width: 1px;
    background: var(--border);
  }
  .stat-chip .stat-value {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-data);
    display: inline-block;
    transition: transform 0.15s;
  }
  .stat-chip .stat-value.pnl-up { color: var(--green); }
  .stat-chip .stat-value.pnl-down { color: var(--red); }
  .stat-chip .stat-label {
    display: block;
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }
  .stat-value.shatter { animation: shatter 0.5s ease; }
  @keyframes shatter {
    0% { transform: scale(1) rotate(0); opacity: 1; }
    20% { transform: scale(1.15) rotate(-4deg); opacity: 1; }
    40% { transform: scale(0.9) rotate(4deg); opacity: 0.6; filter: blur(0.5px); }
    60% { transform: scale(1.05) rotate(-2deg); opacity: 0.4; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* ---------- multiplier badge ---------- */
  .multiplier-badge {
    position: absolute;
    top: 82px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: linear-gradient(135deg, #ffb020, #ff5e3a);
    color: #1a0a00;
    font-weight: 900;
    font-size: 1.3rem;
    padding: 10px 22px;
    border-radius: 999px;
    box-shadow: 0 6px 24px rgba(255, 130, 0, 0.5);
    z-index: 50;
    pointer-events: none;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .multiplier-badge.show { animation: badgeSlam 1.4s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes badgeSlam {
    0% { transform: translateX(-50%) scale(0) rotate(-8deg); opacity: 0; }
    15% { transform: translateX(-50%) scale(1.25) rotate(4deg); opacity: 1; }
    30% { transform: translateX(-50%) scale(0.95) rotate(-2deg); opacity: 1; }
    45% { transform: translateX(-50%) scale(1.05) rotate(0); opacity: 1; }
    75% { transform: translateX(-50%) scale(1) rotate(0); opacity: 1; }
    100% { transform: translateX(-50%) scale(1) rotate(0); opacity: 0; }
  }

  /* ---------- chart ---------- */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 2px;
    position: relative;
    height: 60vh;
    min-height: 340px;
    max-height: 540px;
    overflow: hidden;
  }
  .chart-card.slide-in { animation: slideIn 0.3s ease-out; }
  @keyframes slideIn {
    from { transform: translateX(24px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .chart-card.zoom-pulse { animation: zoomPulse 0.25s ease; }
  @keyframes zoomPulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
  .chart-card.shake { animation: shakeAnim 0.2s ease; }
  @keyframes shakeAnim {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); } 40% { transform: translateX(7px); }
    60% { transform: translateX(-5px); } 80% { transform: translateX(3px); }
  }
  #chartContainer { width: 100%; height: 100%; transition: filter 0.4s ease; }
  #chartContainer.desaturate { filter: grayscale(0.7) brightness(0.85); }
  #chartContainer.fizzle-fade { filter: grayscale(1) brightness(0.7); }

  .chart-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 0 4px 8px;
    font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.02em;
    color: var(--text-dim);
  }
  .chart-toolbar .toolbar-symbol { color: var(--text); font-weight: 700; }
  .chart-toolbar .toolbar-sep { opacity: 0.4; }
  .chart-toolbar .toolbar-session {
    margin-left: auto; padding: 2px 9px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 0.66rem; white-space: nowrap;
  }

  .range-zone {
    position: absolute;
    left: 6px; right: 6px;
    background: rgba(245, 180, 0, 0.08);
    border-top: 1px dashed rgba(245, 180, 0, 0.5);
    border-bottom: 1px dashed rgba(245, 180, 0, 0.5);
    pointer-events: none;
    transition: background 0.15s ease;
    z-index: 15;
  }
  .range-zone.pulse { background: rgba(245, 180, 0, 0.28); }

  .forming-marker {
    position: absolute;
    top: 8px; right: 10px;
    z-index: 20;
    background: rgba(245, 180, 0, 0.18);
    border: 1px solid var(--yellow);
    color: var(--yellow);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 5px;
    pointer-events: none;
    white-space: nowrap;
    transition: top 0.1s linear, left 0.1s linear;
  }
  .forming-marker .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--yellow);
    animation: formingPulse 1s ease-in-out infinite;
  }
  @keyframes formingPulse {
    0%, 100% { transform: scale(0.85); opacity: 0.7; box-shadow: 0 0 0 0 rgba(245,180,0,0.5); }
    50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 6px rgba(245,180,0,0); }
  }

  .range-label {
    position: absolute;
    right: 4px;
    z-index: 16;
    background: var(--yellow);
    color: #1a1200;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    font-weight: 800;
    padding: 3px 7px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    transition: top 0.1s linear;
  }
  .range-label.hidden { display: none; }

  .chart-settings-gear {
    position: absolute; top: 8px; left: 8px; z-index: 25;
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(20, 25, 34, 0.85); border: 1px solid var(--border-strong);
    color: var(--text-dim); font-size: 0.95rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .chart-settings-gear:active { transform: scale(0.92); }
  .chart-settings-panel {
    position: absolute; top: 42px; left: 8px; z-index: 26;
    background: var(--card2); border: 1px solid var(--border-strong); border-radius: 12px;
    padding: 10px 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 168px;
  }
  .chart-settings-panel label {
    display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text);
    padding: 6px 0; cursor: pointer; user-select: none;
  }
  .volume-profile-layer {
    position: absolute; top: 0; right: 0; bottom: 0; width: 26%;
    pointer-events: none; z-index: 5;
  }
  .vp-bucket {
    position: absolute; right: 0; background: rgba(139, 149, 167, 0.28);
  }
  .vp-bucket.in-value-area { background: rgba(245, 180, 0, 0.32); }
  .vp-bucket.poc { background: rgba(245, 180, 0, 0.65); }
  .vp-poc-line {
    position: absolute; left: 0; right: 26%; height: 0; border-top: 1px dashed rgba(245, 180, 0, 0.85);
  }
  .vp-va-line {
    position: absolute; left: 0; right: 26%; height: 0; border-top: 1px dotted rgba(139, 149, 167, 0.5);
  }

  /* ---------- order execution trainer ---------- */
  .ot-line {
    position: absolute; left: 0; right: 0; height: 0; z-index: 30; cursor: ns-resize; touch-action: none;
  }
  .ot-line::before { content: ""; position: absolute; left: 0; right: 0; top: -8px; height: 16px; }
  .ot-line.ot-entry { border-top: 2px solid #5c9eff; }
  .ot-line.ot-stop { border-top: 2px dashed #ef5350; }
  .ot-line.ot-target { border-top: 2px dashed #26a69a; }
  .ot-line-label {
    position: absolute; left: 6px; top: -18px; font-family: var(--font-mono); font-size: 0.65rem; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; color: #0b0e14; white-space: nowrap;
  }
  .ot-entry .ot-line-label { background: #5c9eff; }
  .ot-stop .ot-line-label { background: #ef5350; }
  .ot-target .ot-line-label { background: #26a69a; }
  .ot-ticket { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-top: 8px; }
  .ot-ticket-row { margin-bottom: 10px; }
  .ot-ticket-row:last-of-type { margin-bottom: 0; }
  .ot-hint { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 10px; line-height: 1.4; }
  .ot-error { font-size: 0.8rem; color: var(--red); margin-bottom: 8px; }
  .ot-result-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; text-align: center;
  }
  .ot-result-r { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 2.2rem; font-weight: 700; }
  .ot-result-r.pos { color: var(--green); }
  .ot-result-r.neg { color: var(--red); }
  .ot-result-r.neutral { color: var(--muted); }

  /* ---------- strategy packs (Phase 3) ---------- */
  .strategy-section-label {
    font-family: var(--font-display); font-size: 0.95rem; color: var(--text-dim);
    margin: 18px 4px 8px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .ict-honesty-banner {
    background: rgba(245, 180, 0, 0.08); border: 1px solid rgba(245, 180, 0, 0.35);
    border-radius: 12px; padding: 10px 14px; font-size: 0.78rem; color: var(--text-dim);
    line-height: 1.4; margin: 0 4px 12px;
  }
  .strategy-pack-grid { display: flex; flex-direction: column; gap: 8px; padding: 0 4px; }
  .strategy-pack-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; text-align: left; cursor: pointer;
  }
  .strategy-pack-card:active { transform: scale(0.98); }
  .strategy-pack-card.pro-locked { opacity: 0.75; }
  .spc-label { font-family: var(--font-display); font-size: 0.95rem; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
  .spc-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.35; }
  .pro-chip-inline {
    display: inline-block; font-family: var(--font-mono); font-size: 0.55rem; font-weight: 700; letter-spacing: 0.3px;
    color: #1a1200; background: #f5b400; border-radius: 6px; padding: 2px 6px;
  }
  .daily-limit-note { font-size: 0.72rem; color: var(--muted); text-align: center; margin: -6px 0 6px; }

  /* ---------- paywall bottom sheet (Phase 5) ---------- */
  .paywall-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .paywall-sheet {
    background: var(--card); border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 20px 20px 28px; max-width: 480px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-sizing: border-box; animation: paywallSlideUp 0.25s ease;
  }
  @keyframes paywallSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .paywall-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .paywall-badge {
    display: inline-block; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 1px;
    color: #1a1200; background: #f5b400; border-radius: 6px; padding: 3px 8px; font-weight: 700; margin-bottom: 10px;
  }
  .paywall-sheet h3 { font-family: var(--font-display); margin: 0 0 12px; font-size: 1.15rem; }
  .paywall-features { list-style: none; padding: 0; margin: 0 0 16px; }
  .paywall-features li { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; display: flex; gap: 8px; }
  .paywall-features li::before { content: "✓"; color: #26a69a; font-weight: 700; }
  .paywall-msg-body { font-size: 0.9rem; color: var(--muted); line-height: 1.5; margin: 0 0 16px; }
  .pro-chip-inline.beta-chip { background: #f5b400; cursor: pointer; }
  .paywall-form { display: flex; gap: 8px; margin-bottom: 10px; }
  .paywall-form input {
    flex: 1; background: var(--bg, #0b0e14); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; color: var(--text); font-size: 0.9rem; min-width: 0;
  }
  .paywall-join-btn {
    background: #f5b400; color: #1a1200; border: none; border-radius: 10px; padding: 12px 16px;
    font-weight: 700; font-family: var(--font-display); cursor: pointer; white-space: nowrap;
  }
  .paywall-msg { font-size: 0.8rem; margin-bottom: 8px; }
  .paywall-msg.success { color: #26a69a; }
  .paywall-msg.error { color: #ef5350; }
  .paywall-dismiss {
    display: block; width: 100%; background: none; border: none; color: var(--muted);
    font-size: 0.85rem; padding: 8px; cursor: pointer; text-decoration: underline; font-family: inherit;
  }

  .legend-row {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    font-size: 0.68rem; color: var(--muted); margin: 3px 0 2px;
  }
  .legend-row span { display: inline-flex; align-items: center; gap: 4px; }
  .legend-row .swatch { display: inline-block; width: 10px; height: 2px; }

  .powerup-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 8px 0 2px; }
  .powerup-bar.hidden { display: none; }
  .powerup-chip {
    background: var(--card2); border: 1px solid var(--border-strong); color: var(--text);
    font-family: var(--font-body); font-size: 0.78rem; font-weight: 600;
    padding: 7px 12px; border-radius: 999px; cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), border-color 0.15s ease;
  }
  .powerup-chip:active { transform: scale(0.94); }
  .powerup-chip:hover { border-color: var(--gold); }
  .powerup-chip.active { background: rgba(245,180,0,0.12); border-color: var(--yellow); color: var(--yellow); cursor: default; }
  .powerup-chip .chip-count { color: var(--text-dim); font-family: var(--font-mono); }
  .second-chance-btn {
    width: 100%; padding: 13px; font-size: 0.92rem; font-weight: 700; font-family: var(--font-display);
    border-radius: 12px; border: 1px solid rgba(199, 146, 234, 0.4); background: rgba(199, 146, 234, 0.1);
    color: var(--purple); cursor: pointer; margin-top: 8px;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .second-chance-btn:active { transform: scale(0.97); }

  /* ---------- timer ---------- */
  .timer-bar-wrap {
    height: 8px; background: var(--card2); border-radius: 5px;
    margin: 7px 0 6px; overflow: hidden; border: 1px solid var(--border);
  }
  .timer-fill { height: 100%; width: 100%; background: var(--green); border-radius: 5px; }
  .timer-fill.warn { background: var(--yellow); }
  .timer-fill.danger { background: var(--red); animation: timerPulse 0.5s ease-in-out infinite; }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* ---------- near-miss drama (retention Stage 1) ---------- */
  body.near-miss-glow::after {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 30;
    box-shadow: inset 0 0 70px 12px rgba(239, 68, 68, 0.4), inset 0 0 24px 6px rgba(245, 180, 0, 0.3);
    animation: nearMissEdgePulse 1.1s ease-in-out infinite;
  }
  @keyframes nearMissEdgePulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    body.near-miss-glow::after { animation: none; opacity: 0.85; }
  }

  /* ---------- buttons ---------- */
  .buttons-row { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 18px 8px; font-size: 1.05rem; font-weight: 700;
    font-family: var(--font-display);
    border-radius: 16px; border: none; cursor: pointer; color: #fff;
    letter-spacing: 0.3px; min-height: 60px;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(0,0,0,0.12), 0 6px 20px var(--btn-shadow-color, rgba(0,0,0,0.2));
  }
  .btn:active { transform: translateY(1px) scale(0.98); box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -1px 0 rgba(0,0,0,0.12), 0 2px 8px var(--btn-shadow-color, rgba(0,0,0,0.18)); }
  .btn.real { background: linear-gradient(180deg, var(--green), var(--green-dark)); --btn-shadow-color: rgba(34,197,94,0.2); }
  .btn.fake { background: linear-gradient(180deg, var(--red), var(--red-dark)); --btn-shadow-color: rgba(239,68,68,0.2); }
  .btn.wait { background: linear-gradient(180deg, #8b95a7, #565f6e); --btn-shadow-color: rgba(139,149,167,0.2); font-size: 0.9rem; }
  .btn:disabled { opacity: 0.45; cursor: default; }

  .decision-prompt {
    text-align: center; font-size: 0.86rem; font-weight: 600; color: var(--muted);
    margin: 2px 0 8px; letter-spacing: 0.1px;
  }

  .skip-message {
    text-align: center; padding: 14px 10px; border-radius: 14px;
    background: rgba(139, 149, 167, 0.12); border: 1px solid var(--border);
    color: var(--muted); font-weight: 600; font-size: 0.95rem;
  }

  /* ---------- double or nothing offer (retention Stage 1) ---------- */
  .don-card {
    background: linear-gradient(180deg, rgba(245, 180, 0, 0.08), rgba(245, 180, 0, 0.03));
    border: 1px solid rgba(245, 180, 0, 0.35); border-radius: 16px;
    padding: 16px 14px; text-align: center; margin: 2px 0 8px;
    animation: donIn 0.3s cubic-bezier(.22,1,.36,1);
  }
  .don-card.hidden { display: none; }
  @keyframes donIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .don-badge {
    font-family: var(--font-display); font-weight: 800; font-size: 0.95rem;
    color: var(--gold); letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .don-body { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
  .don-actions { display: flex; gap: 10px; }
  .don-actions .btn { flex: 1; min-height: 48px; padding: 12px 8px; font-size: 0.92rem; }

  /* ---------- streak milestone celebration (retention Stage 2) ---------- */
  .milestone-overlay {
    position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center;
    padding: 20px; background: rgba(5, 7, 12, 0.82); backdrop-filter: blur(2px);
    animation: milestoneFadeIn 0.25s ease;
  }
  @keyframes milestoneFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .milestone-card {
    background: var(--card); border: 1px solid rgba(245, 180, 0, 0.4); border-radius: 20px;
    padding: 32px 24px; text-align: center; max-width: 340px; width: 100%;
    max-height: 90vh; overflow-y: auto; box-sizing: border-box;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    animation: milestonePop 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes milestonePop { from { opacity: 0; transform: scale(0.85) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .milestone-flame { font-size: 2.4rem; margin-bottom: 10px; }
  .milestone-title {
    font-family: var(--font-display); font-weight: 800; font-size: 1.3rem;
    color: var(--text); margin-bottom: 8px;
  }
  .milestone-bonus {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    color: var(--gold); font-weight: 700; font-size: 1rem; margin-bottom: 20px;
  }
  .milestone-card .share-btn { margin-bottom: 10px; }
  .archetype-strengths {
    list-style: none; margin: 0 0 14px; padding: 0; text-align: left;
  }
  .archetype-strengths li {
    font-size: 0.88rem; color: var(--text); padding: 6px 0 6px 22px; position: relative; line-height: 1.4;
  }
  .archetype-strengths li::before { content: "✓"; position: absolute; left: 0; color: var(--green); font-weight: 700; }
  .archetype-leak {
    font-size: 0.85rem; color: var(--muted); text-align: left; line-height: 1.5;
    background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 16px;
  }
  .archetype-leak strong { color: var(--red); }

  .wrapped-card { position: relative; padding-top: 44px; }
  .wrapped-skip {
    position: absolute; top: 14px; right: 14px; background: none; border: none;
    color: var(--muted); font-size: 0.82rem; cursor: pointer; padding: 6px 8px;
  }
  .wrapped-month {
    font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.5px;
    color: var(--gold); text-transform: uppercase; margin-bottom: 6px;
  }
  .wrapped-card-label {
    font-size: 0.8rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-top: -6px; margin-bottom: 4px;
  }
  .wrapped-card-sub {
    font-family: var(--font-display); font-weight: 700; font-size: 0.95rem;
    color: var(--gold); margin-bottom: 14px;
  }
  .wrapped-dots { display: flex; justify-content: center; gap: 6px; margin: 10px 0 18px; }
  .wrapped-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-strong); }
  .wrapped-dot.active { background: var(--gold); }
  .wrapped-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .wrapped-nav .mode-btn { margin-bottom: 0; flex: 1; }

  /* ---------- coach card ---------- */
  .coach-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px 14px; text-align: center; animation: coachIn 0.3s cubic-bezier(.22,1,.36,1);
  }
  @keyframes coachIn { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  .clutch-badge {
    display: inline-block; margin: 0 0 10px; padding: 5px 12px;
    border-radius: 999px; background: rgba(245, 180, 0, 0.15); border: 1px solid rgba(245, 180, 0, 0.4);
    color: var(--gold); font-family: var(--font-display); font-weight: 700; font-size: 0.78rem;
    letter-spacing: 0.4px;
  }
  .clutch-badge.hidden { display: none; }
  .clutch-badge.pop { animation: clutchPop 0.4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes clutchPop { 0% { transform: scale(0.6); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  .coach-outcome {
    font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .coach-outcome.correct { color: var(--green); }
  .coach-outcome.wrong { color: var(--red); }
  .coach-outcome.neutral { color: var(--muted); }
  .coach-why-list {
    list-style: none; margin: 0 0 10px; padding: 0; text-align: left;
    display: inline-block;
  }
  .coach-why-list li {
    font-size: 0.9rem; color: var(--text); opacity: 0.92; line-height: 1.4;
    padding: 3px 0 3px 18px; position: relative;
  }
  .coach-why-list li::before {
    content: "•"; position: absolute; left: 2px; color: var(--gold); font-weight: 700;
  }
  .coach-pnl { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }
  .coach-pnl.pos { color: var(--green); }
  .coach-pnl.neg { color: var(--red); }
  .next-btn {
    width: 100%; padding: 14px; font-size: 1rem; font-weight: 700; font-family: var(--font-display); border-radius: 14px;
    border: 1px solid var(--border); background: var(--card2); color: var(--text); cursor: pointer;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .next-btn:active { transform: scale(0.97); }

  .hidden { display: none !important; }

  /* ---------- end of day ---------- */
  .end-of-day { text-align: center; padding: 16px 10px; }
  .end-of-day h2 { font-family: var(--font-display); font-size: 1.5rem; margin: 4px 0 16px; }
  .eod-pnl { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 3rem; font-weight: 700; margin-bottom: 4px; }
  .eod-pnl.pos { color: var(--green); }
  .eod-pnl.neg { color: var(--red); }
  .eod-grid { display: flex; gap: 8px; margin: 16px 0; }
  .eod-grid .cell { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 6px; }
  .eod-grid .cell .v { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 1.3rem; font-weight: 700; }
  .eod-grid .cell .l { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .eod-verdict {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; font-size: 0.95rem; margin-bottom: 16px; line-height: 1.4;
  }
  .trade-again-btn {
    width: 100%; padding: 17px; font-size: 1.05rem; font-weight: 700; font-family: var(--font-display); border-radius: 16px;
    border: none; background: linear-gradient(180deg, var(--green), var(--green-dark)); color: #fff; cursor: pointer;
    margin-bottom: 10px; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 6px 20px rgba(34,197,94,0.2);
  }
  .trade-again-btn:active { transform: scale(0.96); }
  .share-btn {
    width: 100%; padding: 15px; font-size: 0.95rem; font-weight: 700; font-family: var(--font-display); border-radius: 14px;
    border: 1px solid var(--border); background: var(--card2); color: var(--text); cursor: pointer;
    margin-bottom: 10px; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .share-btn:active { transform: scale(0.97); }
  .text-link-btn {
    background: none; border: none; color: var(--muted); font-size: 0.85rem;
    text-decoration: underline; cursor: pointer; padding: 8px;
  }
  .challenge-btn {
    width: 100%; padding: 15px; font-size: 0.95rem; font-weight: 700; font-family: var(--font-display); border-radius: 14px;
    border: 1px solid rgba(199, 146, 234, 0.4); background: rgba(199, 146, 234, 0.1); color: var(--purple); cursor: pointer;
    margin-bottom: 10px; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .challenge-btn:active { transform: scale(0.97); }
  .challenge-link-box {
    margin: 4px 0 14px; text-align: left; background: var(--card2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px;
  }
  .challenge-link-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
  .challenge-link-row { display: flex; gap: 8px; }
  .challenge-link-row input {
    flex: 1; min-width: 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-mono); font-size: 0.78rem; padding: 8px 10px;
  }
  .challenge-link-row button {
    flex-shrink: 0; padding: 8px 14px; font-size: 0.85rem; font-family: var(--font-display); font-weight: 700;
    border-radius: 8px; border: 1px solid var(--border-strong); background: var(--card2); color: var(--text); cursor: pointer;
  }
  .challenge-vs-row { display: flex; align-items: center; gap: 10px; margin: 10px 0 16px; }
  .challenge-vs-side {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 6px; text-align: center;
  }
  .challenge-vs-side.win { border-color: var(--gold); background: rgba(245,180,0,0.08); }
  .challenge-vs-name {
    font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .challenge-vs-score { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 1.15rem; font-weight: 700; }
  .challenge-vs-sep { font-family: var(--font-display); font-weight: 700; color: var(--muted); font-size: 0.85rem; }

  /* ---------- exit confirm modal ---------- */
  .exit-confirm-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(5, 7, 12, 0.72);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .exit-confirm-overlay.show { opacity: 1; pointer-events: auto; }
  .exit-confirm-card {
    background: var(--card2); border: 1px solid var(--border-strong); border-radius: 16px;
    padding: 22px; max-width: 340px; width: 100%; text-align: center;
    max-height: 90vh; overflow-y: auto; box-sizing: border-box;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    transform: scale(0.95); transition: transform 0.15s ease;
  }
  .exit-confirm-overlay.show .exit-confirm-card { transform: scale(1); }
  .exit-confirm-text { font-size: 0.98rem; font-weight: 600; margin-bottom: 18px; line-height: 1.4; }
  .exit-confirm-buttons { display: flex; gap: 10px; }
  .exit-confirm-buttons button {
    flex: 1; padding: 13px; font-size: 0.92rem; font-weight: 700; font-family: var(--font-display);
    border-radius: 12px; cursor: pointer; transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .exit-confirm-buttons button:active { transform: scale(0.95); }
  #exitStayBtn { background: var(--card); border: 1px solid var(--border); color: var(--text); }
  #exitLeaveBtn { background: linear-gradient(180deg, var(--red), var(--red-dark)); border: none; color: #fff; }

  .loading, .error { text-align: center; padding: 60px 12px; color: var(--muted); }
  .error { color: var(--red); }
  .brand-loading {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 90px 12px;
  }
  .brand-loading .candle-pulse {
    width: 34px; height: 46px;
    position: relative;
    animation: candlePulse 1.1s ease-in-out infinite;
  }
  .brand-loading .candle-pulse::before {
    content: "";
    position: absolute; left: 50%; top: 0; bottom: 0;
    width: 2px; margin-left: -1px;
    background: var(--candle-green);
  }
  .brand-loading .candle-pulse::after {
    content: "";
    position: absolute; left: 50%; top: 30%; height: 40%;
    width: 16px; margin-left: -8px;
    background: var(--candle-green);
    border-radius: 2px;
  }
  @keyframes candlePulse {
    0%, 100% { transform: scaleY(0.85); opacity: 0.6; }
    50% { transform: scaleY(1); opacity: 1; }
  }
  .brand-loading .brand-loading-text {
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--text-dim);
    font-size: 0.95rem;
    letter-spacing: 0.5px;
  }

  #confettiLayer { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
  #toastLayer {
    position: fixed; left: 0; right: 0; bottom: 24px; z-index: 998;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    pointer-events: none; padding: 0 16px;
  }
  .toast {
    background: var(--card2); border: 1px solid var(--border-strong); color: var(--text);
    font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
    padding: 12px 18px; border-radius: 999px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-width: 340px; text-align: center;
    animation: toastIn 0.25s cubic-bezier(.34,1.56,.64,1), toastOut 0.25s ease 2.6s forwards;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(12px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-6px); } }
  .confetti-piece { position: absolute; top: -20px; width: 8px; height: 14px; opacity: 0.9; animation: confettiFall linear forwards; }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(540deg); opacity: 0.3; } }

  /* ---------- yesterday's reveal (retention Stage 2) ---------- */
  .reveal-screen { display: flex; align-items: center; justify-content: center; min-height: 70vh; padding: 20px 6px; }
  .reveal-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 30px 22px; text-align: center; max-width: 380px; width: 100%;
    animation: milestonePop 0.35s cubic-bezier(.22,1,.36,1);
  }
  .reveal-badge {
    font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.8px;
    color: var(--gold); border: 1px solid rgba(245, 180, 0, 0.4); border-radius: 999px;
    display: inline-block; padding: 5px 12px; margin-bottom: 16px;
  }
  .reveal-text { color: var(--text); font-size: 0.98rem; line-height: 1.6; margin: 0 0 22px; }

  /* ---------- start screen ---------- */
  .start-screen { text-align: center; padding: 30px 6px 10px; position: relative; }
  .start-wordmark { font-family: var(--font-display); font-size: 2.1rem; font-weight: 700; letter-spacing: -0.5px; }
  .start-sub { color: var(--muted); font-size: 0.95rem; margin: 4px 0 22px; }
  .start-daily-streak {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border); border-radius: 999px;
    padding: 8px 18px; font-weight: 700; font-size: 0.95rem; margin-bottom: 22px;
  }
  .start-daily-streak .win-streak { color: var(--green); font-size: 0.85rem; font-weight: 600; }
  .start-daily-streak .freeze-icons { font-size: 0.9rem; }
  .streak-risk-line {
    font-size: 0.8rem; color: var(--muted); margin: -14px 0 20px;
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
  }
  .daily-goal-chip {
    display: block; font-size: 0.78rem; color: var(--text-dim); margin: 8px 0 20px; text-align: center;
  }
  .freeze-notice {
    background: rgba(92, 158, 255, 0.1); border: 1px solid rgba(92, 158, 255, 0.35);
    color: #5c9eff; border-radius: 12px; padding: 10px 14px; font-size: 0.85rem;
    font-weight: 600; margin-bottom: 16px;
  }
  .comeback-notice {
    background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.35);
    color: var(--green); border-radius: 12px; padding: 10px 14px; font-size: 0.85rem;
    font-weight: 600; margin-bottom: 16px;
  }
  .mode-btn {
    width: 100%; padding: 20px; font-size: 1.05rem; font-weight: 700; font-family: var(--font-display); border-radius: 16px;
    border: none; cursor: pointer; color: #fff; margin-bottom: 12px; letter-spacing: 0.3px;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(0,0,0,0.12), 0 6px 20px var(--btn-shadow-color, rgba(0,0,0,0.2));
  }
  .mode-btn:active { transform: translateY(1px) scale(0.97); box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -1px 0 rgba(0,0,0,0.12), 0 2px 8px var(--btn-shadow-color, rgba(0,0,0,0.18)); }
  .daily-btn { background: linear-gradient(135deg, #ffb020, #ff5e3a); color: #1a0a00; --btn-shadow-color: rgba(255,130,0,0.25); }
  .daily-btn.done { background: var(--card2); color: var(--muted); border: 1px solid var(--border); box-shadow: none; }
  .daily-btn.locked {
    background: var(--card2); color: var(--text-dim); border: 1px solid var(--border); box-shadow: none;
    cursor: default; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 0.95rem;
  }
  .daily-btn.locked:active { transform: none; }
  .daily-btn:disabled { opacity: 1; }
  .practice-btn { background: linear-gradient(180deg, var(--green), var(--green-dark)); --btn-shadow-color: rgba(34,197,94,0.2); }
  .speedrun-btn { background: linear-gradient(135deg, #f5b400, #ff8a3d); color: #1a1200; --btn-shadow-color: rgba(245,180,0,0.25); }

  /* ---------- customize-drills panel ---------- */
  .customize-panel { margin-bottom: 14px; text-align: left; }
  .customize-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; color: var(--text-dim); font-family: var(--font-body); font-weight: 600;
    font-size: 0.88rem; cursor: pointer;
  }

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function playTone(freq, duration, type, gainPeak, delay) {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const t0 = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(gainPeak || 0.12, t0 + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + duration + 0.03);
  } catch (e) {}
}

function toEasternChartTime(unixSeconds) {
  const d = new Date(unixSeconds * 1000);
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York",
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: false,
  }).formatToParts(d);
  const map = {};
  parts.forEach(p => map[p.type] = p.value);
  let hour = parseInt(map.hour, 10);
  if (hour === 24) hour = 0;
  const fakeUtcMs = Date.UTC(
    parseInt(map.year, 10), parseInt(map.month, 10) - 1, parseInt(map.day, 10),
    hour, parseInt(map.minute, 10), parseInt(map.second, 10)
  );
  return Math.floor(fakeUtcMs / 1000);
}
function getEtDateString(offsetDays) {
  const now = new Date(Date.now() + (offsetDays || 0) * 86400000);
  return new Intl.DateTimeFormat("en-CA", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" }).format(now);

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];

function animateNumber(fromVal, toVal, duration, onUpdate, onComplete) {
  const start = performance.now();
  function step(now) {
    const elapsed = now - start;
    const t = Math.min(1, elapsed / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    onUpdate(fromVal + (toVal - fromVal) * eased);
    if (t < 1) requestAnimationFrame(step);
    else { onUpdate(toVal); if (onComplete) onComplete(); }
  }
  requestAnimationFrame(step);
}

// nav badge refreshed on every screen) only animate when the number actually changed.
function animateStatNumber(el, newVal, opts) {
  if (!el) return;
  opts = opts || {};
  const format = opts.format || (v => String(Math.round(v)));
  const apply = opts.html ? (v => { el.innerHTML = v; }) : (v => { el.textContent = v; });
  const prevVal = el.dataset.rawValue !== undefined ? parseFloat(el.dataset.rawValue) : newVal;
  el.dataset.rawValue = newVal;
  if (prevVal === newVal || Number.isNaN(prevVal)) { apply(format(newVal)); return; }
  animateNumber(prevVal, newVal, opts.duration || 450, v => { apply(format(v)); });

/* ---- from pre-decision-visible signals only (never outcome fields).    ---- */
function estimateDrillDifficulty(drill) {
  const volRatio = drill.volume_ratio || 1;
  const volObviousness = Math.min(1, Math.max(0, (volRatio - 1) / 2));
  const contextCount = (drill.context_all && drill.context_all.length) || (drill.context ? 1 : 0);
  const contextObviousness = Math.min(1, contextCount / 3);
  const obviousness = volObviousness * 0.6 + contextObviousness * 0.4;
  return 1 - obviousness; // 0 = obvious/easy, 1 = ambiguous/hard
}
function ratingBandFor(rating) {

// Never surfaces the formula to the player — floor protection (unranked

function updateTraderRating(drill, isCorrect) {

  appState.ratedDrillsCount = (appState.ratedDrillsCount || 0) + 1;
  appState.ratingColdStreak = appState.ratingColdStreak || 0;

  const difficulty = estimateDrillDifficulty(drill);
  const opponentRating = RATING_START + (difficulty - 0.5) * 800;
  const expected = 1 / (1 + Math.pow(10, (opponentRating - appState.traderRating) / 400));
  const actual = isCorrect ? 1 : 0;
  let delta = RATING_K * (actual - expected);

  if (isCorrect) {
    appState.ratingColdStreak = 0;
  } else {
    delta *= RATING_LOSS_DAMPENING;
    if (appState.ratingColdStreak >= 2) delta *= 0.5;
    appState.ratingColdStreak++;
  }

  const prevBand = ratingBandFor(appState.traderRating);
  const wasRanked = appState.ratedDrillsCount - 1 >= RATING_UNRANKED_DRILLS;
  appState.traderRating = Math.round(appState.traderRating + delta);
  saveState();

  const nowRanked = traderRatingIsRanked();
  const newBand = ratingBandFor(appState.traderRating);
  return {
    delta: Math.round(delta),
    rating: appState.traderRating,
    nowRanked,
    justUnranked: nowRanked && !wasRanked,
    bandUp: (nowRanked && wasRanked && newBand.rank > prevBand.rank) ? newBand : null,

function recordArchetypeSignal(mode, choice, drill, isCorrect) {
  const s = appState.archetypeStats = appState.archetypeStats || {

    realOutcomeTotal: 0, realOutcomeCorrect: 0,
    fakeOutcomeTotal: 0, fakeOutcomeCorrect: 0,
    highVolRealTotal: 0, highVolRealCorrect: 0,
  };

    if (choice === "wait") s.waitChosenCount++;
    return;
  }
  // classic decision format (practice + daily): choice is "real" or "fake"
  if (choice === "real") s.takeCount++; else if (choice === "fake") s.fadeCount++;
  if (drill.outcome === "real") {
    s.realOutcomeTotal++;
    if (isCorrect) s.realOutcomeCorrect++;
    if ((drill.volume_ratio || 0) >= 2) {
      s.highVolRealTotal++;
      if (isCorrect) s.highVolRealCorrect++;
    }
  } else if (drill.outcome === "fake") {
    s.fakeOutcomeTotal++;
    if (isCorrect) s.fakeOutcomeCorrect++;
  }
}
function computeArchetype() {
  const s = appState.archetypeStats || {};
  const totalDrills = appState.totalDrillsAnswered || 0;
  const accuracy = totalDrills ? (appState.totalCorrect || 0) / totalDrills : 0;
  const decisionsTracked = (s.takeCount || 0) + (s.fadeCount || 0) + (s.waitChosenCount || 0);
  const waitRate = decisionsTracked ? (s.waitChosenCount || 0) / decisionsTracked : 0;
  const fadeRate = decisionsTracked ? (s.fadeCount || 0) / decisionsTracked : 0;
  const realAccuracy = s.realOutcomeTotal ? s.realOutcomeCorrect / s.realOutcomeTotal : accuracy;
  const fakeAccuracy = s.fakeOutcomeTotal ? s.fakeOutcomeCorrect / s.fakeOutcomeTotal : accuracy;
  const hvRealAccuracy = (s.highVolRealTotal || 0) >= 5 ? s.highVolRealCorrect / s.highVolRealTotal : realAccuracy;
  const bestStreak = appState.bestStreakEver || 0;
  const isHighVolumePlayer = totalDrills >= ARCHETYPE_HIGH_VOLUME_DRILLS;

  const clamp01 = v => Math.max(0, Math.min(1, v));
  const scores = {
    sniper: clamp01(accuracy / 0.65) * 0.5 + clamp01(waitRate / 0.3) * 0.3 + (isHighVolumePlayer ? 0.3 : 1) * 0.2,
    // "takes most setups" is the dominant cowboy signal — volume alone
    // overlaps too much with grinder, so it's weighted as secondary here.
    cowboy: clamp01(totalDrills / ARCHETYPE_HIGH_VOLUME_DRILLS) * 0.3 + clamp01(1 - (fadeRate + waitRate) / 0.3) * 0.7,
    skeptic: clamp01(fadeRate / 0.55) * 0.5 + clamp01(fakeAccuracy / 0.6) * 0.5,
    momentum: clamp01(hvRealAccuracy / 0.65) * 0.6 + clamp01(1 - fakeAccuracy / 0.5) * 0.4,
    // long streaks are the dominant grinder signal — a generic "moderate
    // accuracy at high volume" bucket alone was swallowing cowboy profiles.
    grinder: clamp01(totalDrills / ARCHETYPE_HIGH_VOLUME_DRILLS) * 0.25 + clamp01(bestStreak / 10) * 0.6 + clamp01(1 - Math.abs(accuracy - 0.56) / 0.15) * 0.15,
  };
  return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
}

function buildSessionDeck(sourcePool) {
  const pool = shuffleArray((sourcePool || allDrills).slice());
  pool.sort((a, b) => Math.abs(b.volume_ratio - 1) - Math.abs(a.volume_ratio - 1));
  const tercile = Math.floor(pool.length / 3);
  const obvious = shuffleArray(pool.slice(0, tercile));
  const hardest = shuffleArray(pool.slice(pool.length - tercile));
  const middle = shuffleArray(pool.slice(tercile, pool.length - tercile));
  return [...obvious.slice(0, 3), ...middle.slice(0, 4), ...hardest.slice(0, 3)];
}

  highEl.textContent = `RANGE HIGH ${drill.range_high.toFixed(2)}`;
  lowEl.textContent = `RANGE LOW ${drill.range_low.toFixed(2)}`;
  let highTop, lowTop;
  if (Math.abs(yHigh - yLow) < 22) {
    // lines too close together to each carry their own label at the line's
    // height — stack one above, one below, so they never overlap each other
    const mid = (yHigh + yLow) / 2;
    highTop = mid - 20;
    lowTop = mid + 4;
  } else {
    highTop = yHigh - 9;
    lowTop = yLow - 9;
  }
  highEl.style.top = Math.max(2, highTop) + "px";
  lowEl.style.top = Math.max(2, lowTop) + "px";
}

/* ============================= P&L ============================= */
function computePnl(drill, isCorrect, mult) {
  const rangeMid = (drill.range_high + drill.range_low) / 2;
  let magnitudePct;
  if (drill.outcome === "real") {
    magnitudePct = Math.abs((drill.resolved_price - drill.breakout_price) / drill.breakout_price);
  } else {
    magnitudePct = Math.abs((drill.breakout_price - rangeMid) / drill.breakout_price);
  }
  const capped = Math.min(magnitudePct, PNL_CAP_PCT);
  return POSITION_SIZE * capped * (isCorrect ? 1 : -1) * mult;
}

function applyVolumePaneVisibility(visible) {
  if (!chart || !volumeSeries) return;
  try {
    volumeSeries.applyOptions({ visible });
    const panes = chart.panes();
    // Setting the LAST pane's height directly silently no-ops once a second
    // price scale exists on an earlier pane (as SMT Divergence's compare-line
    // overlay does) — setting the price pane's height instead and letting the
    // volume pane auto-fill the remainder works reliably in both cases.
    if (panes[0] && panes[1]) {
      const total = document.getElementById("chartContainer").clientHeight;
      const volHeight = visible ? Math.round(total * 0.32) : 0;
      panes[0].setHeight(Math.max(1, total - volHeight));
    }
  } catch (e) {}
}
function clearVolumeProfile() {
  const layer = document.getElementById("volumeProfileLayer");
  if (layer) { layer.innerHTML = ""; layer.classList.add("hidden"); }

function renderVolumeProfile(drill) {
  const layer = document.getElementById("volumeProfileLayer");
  if (!layer || !candleSeries) return;
  const candles = drill.candles;
  if (!candles || candles.length < 2) { clearVolumeProfile(); return; }

  const BUCKETS = 24;
  let lo = Infinity, hi = -Infinity;
  candles.forEach(c => { lo = Math.min(lo, c.low); hi = Math.max(hi, c.high); });
  const span = hi - lo;
  if (!(span > 0)) { clearVolumeProfile(); return; }

  const volumes = new Array(BUCKETS).fill(0);
  candles.forEach(c => {
    const bLo = Math.max(0, Math.floor(((c.low - lo) / span) * BUCKETS));
    const bHi = Math.min(BUCKETS - 1, Math.floor(((c.high - lo) / span) * BUCKETS));
    const spanBuckets = Math.max(1, bHi - bLo + 1);
    const share = (c.volume || 0) / spanBuckets;
    for (let b = bLo; b <= bHi; b++) volumes[b] += share;
  });

  const total = volumes.reduce((s, v) => s + v, 0);
  if (!(total > 0)) { clearVolumeProfile(); return; }
  const pocIdx = volumes.indexOf(Math.max(...volumes));

  // Value Area: expand out from POC, each step taking whichever neighbor has more volume, until >=70%.
  let vaLo = pocIdx, vaHi = pocIdx, vaSum = volumes[pocIdx];
  while (vaSum / total < 0.70 && (vaLo > 0 || vaHi < BUCKETS - 1)) {
    const nextLo = vaLo > 0 ? volumes[vaLo - 1] : -1;
    const nextHi = vaHi < BUCKETS - 1 ? volumes[vaHi + 1] : -1;
    if (nextHi >= nextLo) { vaHi++; vaSum += volumes[vaHi]; } else { vaLo--; vaSum += volumes[vaLo]; }
  }

  const maxVol = Math.max(...volumes);
  const bucketPrice = (idx) => lo + (idx / BUCKETS) * span;
  let html = "";
  for (let b = 0; b < BUCKETS; b++) {
    if (volumes[b] <= 0) continue;
    const priceTop = bucketPrice(b + 1);
    const priceBot = bucketPrice(b);
    const yTop = candleSeries.priceToCoordinate(priceTop);
    const yBot = candleSeries.priceToCoordinate(priceBot);
    if (yTop === null || yBot === null) continue;
    const widthPct = Math.max(4, (volumes[b] / maxVol) * 100);
    const cls = b === pocIdx ? "vp-bucket poc" : (b >= vaLo && b <= vaHi) ? "vp-bucket in-value-area" : "vp-bucket";
    html += `<div class="${cls}" style="top:${Math.min(yTop, yBot)}px;height:${Math.max(1, Math.abs(yBot - yTop))}px;width:${widthPct}%;"></div>`;
  }
  const pocY = candleSeries.priceToCoordinate(bucketPrice(pocIdx + 0.5));
  const vahY = candleSeries.priceToCoordinate(bucketPrice(vaHi + 1));
  const valY = candleSeries.priceToCoordinate(bucketPrice(vaLo));
  if (pocY !== null) html += `<div class="vp-poc-line" style="top:${pocY}px;" title="POC"></div>`;
  if (vahY !== null) html += `<div class="vp-va-line" style="top:${vahY}px;" title="VAH"></div>`;
  if (valY !== null) html += `<div class="vp-va-line" style="top:${valY}px;" title="VAL"></div>`;

  layer.innerHTML = html;
  layer.classList.remove("hidden");
}

// Progressively fans candles/volume/vwap in left-to-right over ~400ms when a drill
// loads, instead of snapping the whole chart in at once. Falls back to an instant
// setData for the final step so the chart always ends up fully correct.
function revealChartEntrance(candleData, volumeData, vwapData, totalMs) {
  totalMs = totalMs || 400;
  const n = candleData.length;
  if (n <= 1) {
    candleSeries.setData(candleData);
    volumeSeries.setData(volumeData);
    vwapSeries.setData(vwapData);
    return;
  }
  const steps = Math.min(n, 16);
  const stepMs = totalMs / steps;
  let step = 0;
  function tick() {
    step++;
    const count = Math.max(1, Math.round((step / steps) * n));
    candleSeries.setData(candleData.slice(0, count));
    volumeSeries.setData(volumeData.slice(0, count));
    vwapSeries.setData(vwapData.slice(0, count));
    chart.timeScale().scrollToRealTime();
    if (step < steps) setTimeout(tick, stepMs);
  }
  tick();
}

function loadDrill(drill, opts) {
  opts = opts || {};

  if (counterEl) counterEl.textContent = `${sessionIndex + 1}/${sessionDeck.length}`;
  updateSessionProgressStrip();

  if (chart) { try { chart.remove(); } catch (e) {} chart = null; }
  const container = document.getElementById("chartContainer");
  initChart(container);

  const candleData = drill.candles.map(c => ({ time: toEasternChartTime(c.time), open: c.open, high: c.high, low: c.low, close: c.close }));
  const volumeData = drill.candles.map(c => ({ time: toEasternChartTime(c.time), value: c.volume, color: c.close >= c.open ? "rgba(38,166,154,0.7)" : "rgba(239,83,80,0.7)" }));
  const vwapData = drill.vwap.slice(0, drill.candles.length).map(v => ({ time: toEasternChartTime(v.time), value: v.value }));
  revealChartEntrance(candleData, volumeData, vwapData);

  if (drill.compare_series && drill.compare_series.length) {
    compareSeries = addSeriesCompat(chart, "Line", { color: "#5c9eff", lineWidth: 2, priceScaleId: "left", priceLineVisible: false, lastValueVisible: false }, 0);
    chart.priceScale("left").applyOptions({ visible: true });
    compareSeries.setData(drill.compare_series.map(v => ({ time: toEasternChartTime(v.time), value: v.value })));
  } else {
    compareSeries = null;
  }

  const chartSettings = appState.chartSettings || { volumeProfile: false, showVwap: true, showVolume: true };
  vwapSeries.applyOptions({ visible: chartSettings.showVwap !== false });

  clearPriceLines();
  // native axis badge disabled — the custom "RANGE HIGH/LOW <price>" tags
  // (updateRangeLabels) fully replace it with combined title+price text
  addPriceLine(drill.range_high, "#f5b400", false);
  addPriceLine(drill.range_low, "#f5b400", false);
  const lastVol = drill.candles[drill.candles.length - 1].volume;
  const avgVol = drill.volume_ratio > 0 ? lastVol / drill.volume_ratio : null;
  if (avgVol) {
    const activityLabel = drill.has_volume === false ? "Avg activity" : "Avg volume";
    const avgLine = volumeSeries.createPriceLine({ price: avgVol, color: "#8b95a7", lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: activityLabel });
    priceLinesList.push({ remove: () => volumeSeries.removePriceLine(avgLine) });
  }

  chart.timeScale().scrollToRealTime();
  requestAnimationFrame(() => requestAnimationFrame(() => {
    // A compare-line series on its own left price scale (SMT Divergence) makes
    // the volume pane stop responding to setHeight() afterward — leave whatever
    // height initChart() already gave it rather than fight the chart library.
    if (!compareSeries) applyVolumePaneVisibility(chartSettings.showVolume !== false);
    updateRangeZone(drill);
    updateRangeLabels(drill);
    positionFormingMarker(drill);
    if (chartSettings.volumeProfile) renderVolumeProfile(drill); else clearVolumeProfile();
  }));

  if (currentMode !== "longshortwait" && currentMode !== "strategy_pack") document.getElementById("formingMarker").classList.remove("hidden");

  if (currentMode === "practice" && Math.random() < DOUBLE_OR_NOTHING_CHANCE) {
    showDoubleOrNothingOffer();
  } else if (!opts.deferTimer) {
    startTimer();
  }
}

function startTimer() {

    : currentMode === "practice" ? (appState.practiceTimerSeconds || PRACTICE_TIMER_START)
    : currentMode === "longshortwait" ? LSW_DECISION_SECONDS
    : currentMode === "strategy_pack" ? STRATEGY_PACK_DECISION_SECONDS
    : DECISION_SECONDS;
  timerDeadline = performance.now() + decisionSeconds * 1000;
  const fill = document.getElementById("timerFill");
  function tick() {
    if (answered) return;
    const remaining = timerDeadline - performance.now();
    const pct = Math.max(0, remaining / (decisionSeconds * 1000));
    fill.style.width = (pct * 100) + "%";
    fill.classList.toggle("warn", remaining <= 5000 && remaining > 3000);
    fill.classList.toggle("danger", remaining <= 3000);
    if (remaining <= 0) { handleTimeout(); return; }
    timerHandle = requestAnimationFrame(tick);
  }
  timerHandle = requestAnimationFrame(tick);
}
function clearTimer() { if (timerHandle) cancelAnimationFrame(timerHandle); timerHandle = null; }
function disableButtons() {

/* ---- near-miss drama: price grazes the level that would flip the call ---- */
function startNearMissDrama() { document.body.classList.add("near-miss-glow"); }
function stopNearMissDrama() { document.body.classList.remove("near-miss-glow"); }

function startPlayout(drill, choice) {
  const playoutCandles = drill.playout_candles || [];
  const stopIndex = (drill.resolution_bar_index !== null && drill.resolution_bar_index !== undefined) ? drill.resolution_bar_index : playoutCandles.length - 1;
  const totalSteps = Math.max(1, Math.min(stopIndex, playoutCandles.length - 1) + 1);
  nearMissActive = false;
  nearMissUsedThisPlayout = false;
  let i = 0;
  function stepFn() {
    if (i >= playoutCandles.length || i > stopIndex) { stopNearMissDrama(); finishPlayout(drill, choice); return; }
    const c = playoutCandles[i];
    const vwapIdx = drill.candles.length + i;
    candleSeries.update({ time: toEasternChartTime(c.time), open: c.open, high: c.high, low: c.low, close: c.close });
    volumeSeries.update({ time: toEasternChartTime(c.time), value: c.volume, color: c.close >= c.open ? "rgba(38,166,154,0.7)" : "rgba(239,83,80,0.7)" });
    if (vwapIdx < drill.vwap.length) vwapSeries.update({ time: toEasternChartTime(drill.vwap[vwapIdx].time), value: drill.vwap[vwapIdx].value });
    playTick();

    const distHigh = Math.abs(c.close - drill.range_high) / drill.range_high;
    const distLow = Math.abs(c.close - drill.range_low) / drill.range_low;
    const minDist = Math.min(distHigh, distLow);
    if (minDist <= RANGE_PROXIMITY_PCT) pulseRangeZone();

    const isNearMiss = minDist <= NEAR_MISS_PROXIMITY_PCT && !nearMissUsedThisPlayout;
    if (isNearMiss) {
      if (!nearMissActive) { nearMissActive = true; startNearMissDrama(); }
      playHeartbeat();
    } else if (nearMissActive) {
      nearMissActive = false;
      nearMissUsedThisPlayout = true;
      stopNearMissDrama();
    }

    chart.timeScale().scrollToRealTime();
    updateRangeZone(drill);
    updateRangeLabels(drill);

    i++;
    const progress = i / totalSteps;
    const normalDelay = PLAYOUT_START_MS - (PLAYOUT_START_MS - PLAYOUT_END_MS) * Math.min(1, progress);
    const delay = nearMissActive ? NEAR_MISS_SLOWDOWN_MS : normalDelay;
    playoutHandle = setTimeout(stepFn, delay);
  }
  stepFn();
}

function computeStrategyPackPnl(drill, isCorrect) {
  const lastClose = drill.candles[drill.candles.length - 1].close;

  const magnitudePct = lastClose > 0 && refRange > 0
    ? Math.min((0.75 * refRange) / lastClose, PNL_CAP_PCT)
    : 0.01;
  return POSITION_SIZE * magnitudePct * (isCorrect ? 1 : -1);
}

function makeOtLineDraggable(lineEl) {
  if (!lineEl) return;
  let dragging = false;
  lineEl.addEventListener("pointerdown", (e) => {
    dragging = true;
    try { lineEl.setPointerCapture(e.pointerId); } catch (err) {}
  });
  lineEl.addEventListener("pointermove", (e) => {
    if (!dragging || !candleSeries) return;
    const rect = document.getElementById("chartCard").getBoundingClientRect();
    const y = Math.max(0, Math.min(rect.height, e.clientY - rect.top));
    lineEl.style.top = y + "px";
    const price = candleSeries.coordinateToPrice(y);
    if (price !== null) storeOtLinePrice(lineEl.dataset.role || lineEl.id, price);
  });
  lineEl.addEventListener("pointerup", (e) => {
    dragging = false;
    try { lineEl.releasePointerCapture(e.pointerId); } catch (err) {}
  });
}
function storeOtLinePrice(idOrRole, price) {
  if (idOrRole === "otEntryLine") otEntryPrice = price;
  else if (idOrRole === "otStopLine") otStopPrice = price;
  else if (idOrRole === "otTargetLine") otTargetPrice = price;
}
function resetOtLinesToDefault() {
  if (!otDrill || !candleSeries) return;
  const lastClose = otDrill.candles[otDrill.candles.length - 1].close;
  const refRange = (otDrill.range_high && otDrill.range_low) ? (otDrill.range_high - otDrill.range_low) : lastClose * 0.005;
  const offset = Math.max(refRange * 0.6, lastClose * 0.002);
  otEntryPrice = lastClose;
  if (otDirection === "long") { otStopPrice = lastClose - offset; otTargetPrice = lastClose + offset * 1.5; }
  else { otStopPrice = lastClose + offset; otTargetPrice = lastClose - offset * 1.5; }
  positionOtLines();
}
function positionOtLines() {
  if (!candleSeries) return;
  const map = [["otEntryLine", otEntryPrice], ["otStopLine", otStopPrice], ["otTargetLine", otTargetPrice]];
  map.forEach(([id, price]) => {
    const el = document.getElementById(id);
    if (!el || price === null) return;
    const y = candleSeries.priceToCoordinate(price);
    if (y === null) return;
    el.style.top = y + "px";
    el.classList.remove("hidden");
  });
}

function validateOtOrder() {
  if (otEntryPrice === null || otStopPrice === null || otTargetPrice === null) return "Set all three lines first.";
  if (otDirection === "long") {
    if (otStopPrice >= otEntryPrice) return "For a LONG, your stop must be below your entry.";
    if (otTargetPrice <= otEntryPrice) return "For a LONG, your target must be above your entry.";
  } else {
    if (otStopPrice <= otEntryPrice) return "For a SHORT, your stop must be above your entry.";
    if (otTargetPrice >= otEntryPrice) return "For a SHORT, your target must be below your entry.";
  }
  return null;
}
function runOrderTrainerFill(drill) {
  const dir = otDirection, orderType = otOrderType;
  const entryLevel = otEntryPrice, stop = otStopPrice, target = otTargetPrice;
  const playout = drill.playout_candles || [];
  const lastClose = drill.candles[drill.candles.length - 1].close;

  let filled = false, fillPrice = null, fillIndex = -1;
  if (orderType === "market") {
    filled = true; fillPrice = lastClose; fillIndex = -1;
  } else {
    for (let i = 0; i < playout.length; i++) {
      const c = playout[i];
      if (orderType === "limit") {
        if (dir === "long" && c.low <= entryLevel) { filled = true; fillPrice = entryLevel; fillIndex = i; }
        else if (dir === "short" && c.high >= entryLevel) { filled = true; fillPrice = entryLevel; fillIndex = i; }
        if (filled) break;
      } else if (orderType === "stop") {
        if (dir === "long" && c.high >= entryLevel) { filled = true; fillPrice = entryLevel; fillIndex = i; }
        else if (dir === "short" && c.low <= entryLevel) { filled = true; fillPrice = entryLevel; fillIndex = i; }
        if (filled) break;
      } else if (orderType === "stoplimit") {
        if (dir === "long" && c.high >= entryLevel) { if (c.open <= entryLevel) { filled = true; fillPrice = entryLevel; fillIndex = i; } break; }
        if (dir === "short" && c.low <= entryLevel) { if (c.open >= entryLevel) { filled = true; fillPrice = entryLevel; fillIndex = i; } break; }
      }
    }
  }

  if (!filled) return { filled: false, dir, orderType };

  let exitPrice = null, exitReason = null;
  const startIdx = orderType === "market" ? 0 : fillIndex + 1;
  for (let i = startIdx; i < playout.length; i++) {
    const c = playout[i];
    if (dir === "long") {
      if (c.low <= stop) { exitPrice = stop; exitReason = "stop"; break; }
      if (c.high >= target) { exitPrice = target; exitReason = "target"; break; }
    } else {
      if (c.high >= stop) { exitPrice = stop; exitReason = "stop"; break; }
      if (c.low <= target) { exitPrice = target; exitReason = "target"; break; }
    }
  }
  if (exitPrice === null) {
    exitPrice = playout.length ? playout[playout.length - 1].close : fillPrice;
    exitReason = "time";
  }

  const risk = Math.abs(fillPrice - stop);
  const reward = dir === "long" ? (exitPrice - fillPrice) : (fillPrice - exitPrice);
  const rMultiple = risk > 0 ? reward / risk : 0;
  return { filled: true, dir, orderType, fillPrice, stop, target, exitPrice, exitReason, rMultiple };
}
function placeOrder() {
  const err = validateOtOrder();
  const errEl = document.getElementById("otError");
  if (err) { errEl.textContent = err; errEl.classList.remove("hidden"); return; }
  errEl.classList.add("hidden");
  document.getElementById("otPlaceBtn").disabled = true;
  document.querySelectorAll(".ot-line").forEach(el => el.style.pointerEvents = "none");

  const result = runOrderTrainerFill(otDrill);
  const playoutCandles = otDrill.playout_candles || [];
  let i = 0;
  function stepFn() {
    if (i >= playoutCandles.length) { finishOrderTrainerRound(result); return; }
    const c = playoutCandles[i];
    const vwapIdx = otDrill.candles.length + i;
    candleSeries.update({ time: toEasternChartTime(c.time), open: c.open, high: c.high, low: c.low, close: c.close });
    volumeSeries.update({ time: toEasternChartTime(c.time), value: c.volume, color: c.close >= c.open ? "rgba(38,166,154,0.7)" : "rgba(239,83,80,0.7)" });
    if (vwapIdx < otDrill.vwap.length) vwapSeries.update({ time: toEasternChartTime(otDrill.vwap[vwapIdx].time), value: otDrill.vwap[vwapIdx].value });
    playTick();
    chart.timeScale().scrollToRealTime();
    positionOtLines();
    i++;
    playoutHandle = setTimeout(stepFn, 350);
  }
  stepFn();
}

  return appState[counterField] || 0;
}
function getDailyLimitRemaining(counterField, dateField, limit) {
  return Math.max(0, limit - getDailyLimitUsed(counterField, dateField));
}
function dailyLimitNoteText() {
  if (BETA_FREE) return "Unlimited during beta";
  const style = appState.drillStyle || "classic";
  if (style === "ordertrainer") {

    return `${left} of ${FREE_ORDER_TRAINER_ROUNDS_PER_DAY} free rounds left today`;
  }
  const left = getDailyLimitRemaining("practiceSessionsToday", "practiceSessionsDate", FREE_PRACTICE_SESSIONS_PER_DAY);
  return `${left} of ${FREE_PRACTICE_SESSIONS_PER_DAY} free sessions left today`;
}
// Checks AND consumes one credit atomically. Returns false (and shows the
// paywall) if the day's free credits are already spent.
function checkDailyLimitOrPaywall(counterField, dateField, limit, title, bullets) {
  if (BETA_FREE) return true; // no daily limits during the open beta
  const today = getEtDateString(0);
  if (appState[dateField] !== today) { appState[dateField] = today; appState[counterField] = 0; }
  if (appState[counterField] >= limit) {
    showPaywallSheet(title, bullets);
    return false;
  }
  appState[counterField]++;
  saveState();
  return true;
}

/* ============================= MISTAKE REVIEW ============================= */
function recordMissOrClear(drill, isCorrect) {
  const idx = appState.missedDrills.findIndex(m => m.id === drill.id);
  if (!isCorrect) {
    if (idx === -1) {
      appState.missedDrills.push({ id: drill.id, market: drill.market || "stocks", timeframe: drill.timeframe || "5m" });
      if (appState.missedDrills.length > 100) appState.missedDrills.shift();
    }
  } else if (idx !== -1) {
    appState.missedDrills.splice(idx, 1);
  }
  saveState();
}
async function startMissReview() {
  if (!appState.missedDrills.length) return;
  renderGameScreen("review");
  const content = document.getElementById("content");
  if (content) content.innerHTML = `<div class="loading">Loading your misses…</div>`;

  // Free tier normally reviews only the most recent FREE_MISS_REVIEW_LIMIT
  // misses (full history is a Pro benefit) — BETA_FREE lifts that cap.
  const reviewable = BETA_FREE ? appState.missedDrills : appState.missedDrills.slice(-FREE_MISS_REVIEW_LIMIT);
  const byPack = {};
  reviewable.forEach(m => {
    const key = (m.market || "stocks") + "|" + (m.timeframe || "5m");
    (byPack[key] = byPack[key] || []).push(m);
  });
  const queue = [];
  for (const key in byPack) {
    const [market, timeframe] = key.split("|");
    const pool = (market === "stocks" && timeframe === "5m") ? allDrills : await loadDrillPack(market, timeframe);
    if (!pool) continue;
    byPack[key].forEach(m => {
      const found = pool.find(d => d.id === m.id);
      if (found) queue.push(found);
    });
  }
  if (!queue.length) {
    showToast("Couldn't load your missed drills — try again in a moment.");
    renderStartScreen();
    return;
  }
  reviewQueue = shuffleArray(queue);
  sessionIndex = 0;
  sessionDeck = reviewQueue;
  sessionResults = [];
  loadDrill(sessionDeck[0], { deferTimer: true });
}
function advanceOrEndReview() {
  clearTimeout(autoAdvanceHandle);

}

// Picks one contextual nudge based on the player's current state — most
// urgent (protect an active streak) first, falling back toward general
// encouragement. Returns null if nothing qualifies yet.
function pickNextActionNudge() {
  const streak = appState.dailyPlayStreak || 0;
  const accuracy = appState.totalDrillsAnswered ? appState.totalCorrect / appState.totalDrillsAnswered : 0;
  if (streak >= 3 && (appState.ownedFreezes || 0) === 0) {
    return { text: "🔥 Protect your streak — get a freeze", href: "/powerups/" };
  }
  if (appState.totalDrillsAnswered >= 10 && accuracy > 0.70) {
    return { text: "You're above 70% — try Speed Run", onClick: () => startNewSpeedRun() };
  }
  if ((appState.practiceSessionsCompleted || 0) >= 3 && appState.practiceMarket !== "forex") {
    return {
      text: "Ready for harder reads? Try Forex →",
      onClick: () => { appState.practiceMarket = "forex"; appState.practiceSession = null; saveState(); renderStartScreen(); },
    };
  }
  if (streak === 0) {
    return { text: "Start a streak — come back tomorrow", href: null };
  }
  return null;
}

  }
}
function startCountdown() {
  clearInterval(window.__countdownInterval);
  function tick() {
    const el = document.getElementById("countdownText");
    if (!el) { clearInterval(window.__countdownInterval); return; }
    const remaining = Math.max(0, getNextDropUnlockMs() - Date.now());
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    el.textContent = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }
  tick();
  window.__countdownInterval = setInterval(tick, 1000);
}

  futures: [["open", "Open (9:30-11)"], ["midday", "Midday (11-2)"], ["power_hour", "Power Hour (2-4)"], ["overnight", "Overnight"]],

function drillPackUrl(market, timeframe) {
  const base = market === "stocks" ? "drills" : `drills-${market}`;
  const suffix = timeframe === "15m" ? "-15m" : "";
  return `../drills/${base}${suffix}.json`;
}
const drillPackCache = {};
async function loadDrillPack(market, timeframe) {
  const key = market + "-" + timeframe;
  if (drillPackCache[key]) return drillPackCache[key];
  try {
    const res = await fetch(drillPackUrl(market, timeframe), { cache: "no-store" });
    if (!res.ok) throw new Error("not found");
    const data = await res.json();
    if (!data.length) throw new Error("empty");
    drillPackCache[key] = data;
    return data;
  } catch (e) {
    return null;
  }
}

// Resolves the practice pool for the current customization, gracefully
// widening (dropping the session filter) if the exact combo is too thin —
// the game should never show the player an empty deck.
async function resolvePracticePool() {
  const market = appState.practiceMarket || "stocks";
  const timeframe = appState.practiceTimeframe || "5m";
  const session = appState.practiceSession || null;

  let pool;
  if (market === "stocks" && timeframe === "5m") {
    pool = allDrills; // already loaded at init — zero extra fetch for the default, unchanged path
  } else {
    pool = await loadDrillPack(market, timeframe);
    if (!pool) {
      showToast("Couldn't load that pack — using Stocks instead.");
      return allDrills;
    }
  }

  if (session) {
    const filtered = pool.filter(d => d.session === session);
    if (filtered.length >= MIN_SESSION_COMBO_DRILLS) return filtered;
    showToast("Not enough drills for that exact combo yet — widened to all sessions.");
    return pool;
  }
  return pool;
}

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = String(text).split(" ");
  let line = "";
  let curY = y;
  words.forEach((word, i) => {
    const testLine = line + word + " ";
    if (ctx.measureText(testLine).width > maxWidth && i > 0) {
      ctx.fillText(line, x, curY);
      line = word + " ";
      curY += lineHeight;
    } else {
      line = testLine;
    }
  });
  ctx.fillText(line, x, curY);
}
function drawMiniChart(ctx, candles, x, y, w, h) {
  if (!candles || !candles.length) return;
  let min = Infinity, max = -Infinity;
  candles.forEach(c => { min = Math.min(min, c.low); max = Math.max(max, c.high); });
  const range = (max - min) || 1;
  const n = candles.length;
  const candleW = w / n;
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.04)";
  ctx.fillRect(x, y, w, h);
  candles.forEach((c, i) => {
    const cx = x + i * candleW + candleW / 2;
    const yHigh = y + h - ((c.high - min) / range) * h;
    const yLow = y + h - ((c.low - min) / range) * h;
    const yOpen = y + h - ((c.open - min) / range) * h;
    const yClose = y + h - ((c.close - min) / range) * h;
    const up = c.close >= c.open;
    ctx.strokeStyle = up ? "#26a69a" : "#ef5350";
    ctx.fillStyle = up ? "#26a69a" : "#ef5350";
    ctx.lineWidth = Math.max(1, candleW * 0.15);
    ctx.beginPath(); ctx.moveTo(cx, yHigh); ctx.lineTo(cx, yLow); ctx.stroke();
    const bodyTop = Math.min(yOpen, yClose);
    const bodyH = Math.max(2, Math.abs(yClose - yOpen));
    ctx.fillRect(cx - candleW * 0.35, bodyTop, candleW * 0.7, bodyH);
  });
  ctx.restore();
}

function generateAndShareCard(mode, data) {
  const canvas = generateShareCanvas(mode, data);
  canvas.toBlob(async (blob) => {
    const fileName = `trade-lee-${getEtDateString(0)}.png`;
    try {
      const file = new File([blob], fileName, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "Trade Lee", text: "Can you read the tape?" });
        return;
      }
    } catch (e) {}
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }, "image/png");
}
